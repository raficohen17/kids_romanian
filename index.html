<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רומנית עם חיוך 🇷🇴</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Arial Hebrew", Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #fff9c4 100%);
    color: #333;
    direction: rtl;
  }
  body { padding: 16px; padding-bottom: 80px; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 { font-size: 2.2rem; color: #d81b60; }
  h1 .flag { font-size: 1.8rem; }
  .subtitle { color: #555; margin-top: 4px; font-size: 1.05rem; }

  .panel {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    max-width: 720px;
    margin: 0 auto 16px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat {
    background: linear-gradient(135deg, #f8bbd0, #ce93d8);
    border-radius: 16px;
    padding: 10px 16px;
    text-align: center;
    color: white;
    font-weight: bold;
    min-width: 100px;
  }
  .stat .num { font-size: 1.6rem; display: block; }
  .stat .lbl { font-size: 0.85rem; opacity: 0.95; }
  .stat.streak { background: linear-gradient(135deg, #ff7043, #ffa726); }
  .stat.score  { background: linear-gradient(135deg, #66bb6a, #26c6da); }
  .stat.total  { background: linear-gradient(135deg, #5c6bc0, #42a5f5); }

  /* mode tabs */
  .modes {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .modes button {
    background: white;
    border: 3px solid #e0e0e0;
    border-radius: 18px;
    padding: 10px 18px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .modes button:hover { border-color: #ba68c8; transform: translateY(-2px); }
  .modes button.active {
    background: linear-gradient(135deg, #ba68c8, #7e57c2);
    color: white;
    border-color: transparent;
  }

  /* category filter */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }
  .chip {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chip.active {
    background: #fff59d;
    border-color: #fbc02d;
    font-weight: bold;
  }

  /* flashcard */
  .flashcard-area { text-align: center; }
  .card {
    background: linear-gradient(135deg, #fff, #f3e5f5);
    border-radius: 28px;
    padding: 40px 24px;
    margin: 16px auto;
    max-width: 480px;
    min-height: 260px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(126, 87, 194, 0.18);
    border: 4px solid #ce93d8;
    transition: transform 0.25s;
    user-select: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .card:active { transform: scale(0.98); }
  .card .emoji { font-size: 4rem; margin-bottom: 12px; }
  .card .he { font-size: 2.4rem; font-weight: bold; color: #4527a0; }
  .card .ro { font-size: 2.2rem; font-weight: bold; color: #c2185b; margin-bottom: 8px; }
  .card .pron { font-size: 1.3rem; color: #555; margin-bottom: 12px; }
  .card .note { font-size: 0.95rem; color: #888; font-style: italic; max-width: 380px; }
  .card .hint { color: #999; margin-top: 14px; font-size: 0.9rem; }

  .nav-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 12px 22px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn.speak { background: linear-gradient(135deg, #66bb6a, #43a047); }
  .btn.prev  { background: linear-gradient(135deg, #ab47bc, #8e24aa); }
  .btn.shuffle { background: linear-gradient(135deg, #ff7043, #f4511e); }

  /* quiz */
  .quiz-q {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #4527a0;
    margin: 12px 0 4px;
  }
  .quiz-q .emoji { font-size: 2.2rem; display: block; margin-bottom: 4px; }
  .quiz-q .prompt { font-size: 1rem; color: #777; font-weight: normal; margin-top: 4px;}
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }
  .opt {
    background: white;
    border: 3px solid #e1bee7;
    border-radius: 18px;
    padding: 16px;
    font-size: 1.3rem;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: #4a148c;
    transition: all 0.12s;
  }
  .opt:hover { background: #f3e5f5; transform: translateY(-2px); }
  .opt.correct {
    background: linear-gradient(135deg, #a5d6a7, #66bb6a);
    color: white;
    border-color: #2e7d32;
    animation: pop 0.4s;
  }
  .opt.wrong {
    background: linear-gradient(135deg, #ef9a9a, #e57373);
    color: white;
    border-color: #c62828;
    animation: shake 0.4s;
  }
  .opt:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 1.4rem;
    font-weight: bold;
    min-height: 1.6rem;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad  { color: #c62828; }

  /* match game */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .match-grid .opt {
    font-size: 1.15rem;
    padding: 14px 10px;
    min-height: 56px;
  }
  .match-grid .opt.selected {
    background: linear-gradient(135deg, #fff59d, #ffee58);
    border-color: #fbc02d;
  }
  .match-grid .opt.matched {
    background: linear-gradient(135deg, #c5e1a5, #aed581);
    border-color: #689f38;
    color: #33691e;
    opacity: 0.6;
    pointer-events: none;
  }

  /* pronunciation guide */
  .guide {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    background: #fff8e1;
    border-radius: 16px;
    padding: 16px 20px;
    margin-top: 8px;
  }
  .guide .letter {
    font-weight: bold;
    color: #c2185b;
    font-size: 1.2rem;
  }
  .guide .desc { color: #555; }

  /* confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    font-size: 1.8rem;
    animation: fall 1.6s linear forwards;
    z-index: 9999;
  }
  @keyframes fall {
    to { transform: translateY(100vh) rotate(540deg); opacity: 0; }
  }

  .end-screen {
    text-align: center;
    padding: 24px;
  }
  .end-screen .big { font-size: 5rem; }
  .end-screen h2 { color: #d81b60; margin: 12px 0; }

  /* listen mode */
  .listen-area {
    text-align: center;
  }
  .listen-btn {
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    border: none;
    border-radius: 50%;
    width: 140px;
    height: 140px;
    font-size: 4rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(67, 160, 71, 0.4);
    margin: 20px auto;
    display: block;
    transition: transform 0.15s;
  }
  .listen-btn:hover { transform: scale(1.05); }
  .listen-btn:active { transform: scale(0.95); }

  /* sentences */
  .sentence-card { padding: 28px 20px; }
  .words-breakdown {
    background: #fff8e1;
    border-radius: 20px;
    padding: 16px 18px;
    margin-top: 18px;
    text-align: right;
  }
  .words-breakdown h3 { color: #c2185b; margin-bottom: 6px; }
  .word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .word-chip {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    text-align: right;
    flex: 1 1 calc(50% - 8px);
    min-width: 180px;
  }
  .word-chip.known { border-color: #aed581; background: #f1f8e9; }
  .word-chip.new   { border-color: #ffb74d; background: #fff3e0; }
  .word-chip b { color: #c2185b; }
  .word-pron { display:block; color: #777; font-size: 0.9rem; margin-top: 2px; }
  .legend {
    display:flex; gap:14px; justify-content:center; margin-top:12px;
    font-size:0.9rem; color:#555;
  }
  .legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-left:4px; vertical-align:middle; }
  .legend .dot.known { background:#aed581; }
  .legend .dot.new   { background:#ffb74d; }

  /* manage */
  .manage-tabs {
    display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;
  }
  .m-tab {
    background:white; border:3px solid #e0e0e0; border-radius:14px;
    padding:8px 16px; font-weight:bold; cursor:pointer; font-family:inherit; font-size:1rem;
  }
  .m-tab.active { background:linear-gradient(135deg,#ffb74d,#fb8c00); color:white; border-color:transparent; }
  .m-heading { color:#4527a0; margin:18px 0 10px; }
  .form-grid {
    display:grid; grid-template-columns: 1fr 1fr; gap:10px;
  }
  @media (max-width:520px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid label {
    display:flex; flex-direction:column; font-weight:bold; color:#555; font-size:0.95rem; gap:4px;
  }
  .form-grid input, .words-textarea {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 12px; font-size:1.05rem;
    font-family:inherit; outline:none; transition: border-color 0.15s;
  }
  .form-grid input:focus, .words-textarea:focus { border-color:#ba68c8; }
  .words-textarea { width:100%; min-height:120px; margin-top:8px; resize:vertical; direction:ltr; }
  .req { color:#e53935; }
  .m-table {
    width:100%; border-collapse:collapse; margin-top:8px; background:white; border-radius:12px; overflow:hidden;
  }
  .m-table th { background:#f3e5f5; color:#4a148c; padding:8px 6px; font-size:0.9rem; text-align:right; }
  .m-table td { padding:8px 6px; border-bottom:1px solid #f0f0f0; font-size:0.95rem; }
  .row-actions { display:flex; gap:4px; justify-content:flex-end; }
  .mini {
    background:white; border:2px solid #e0e0e0; border-radius:10px; padding:4px 8px;
    cursor:pointer; font-size:0.95rem; font-family:inherit;
  }
  .mini:hover { border-color:#ba68c8; }
  .mini.danger:hover { border-color:#e53935; background:#ffebee; }
  .empty-note { color:#888; text-align:center; padding:16px; background:#fafafa; border-radius:12px; }
  .io-row { display:flex; gap:8px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .builtin-list { margin-top:16px; background:#fafafa; border-radius:12px; padding:8px 14px; }
  .builtin-list summary { cursor:pointer; font-weight:bold; color:#555; }
  code { background:#f3e5f5; padding:2px 6px; border-radius:6px; font-size:0.9rem; }

  /* user / admin tab */
  .user-stats {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap:10px; margin-bottom:20px;
  }
  .ustat {
    background: linear-gradient(135deg, #fce4ec, #e1bee7);
    border-radius:16px; padding:14px 8px; text-align:center;
    color:#4a148c; font-weight:bold;
  }
  .ustat .big { font-size:1.8rem; color:#d81b60; }

  .admin-box {
    background: #fafafa;
    border: 2px dashed #ce93d8;
    border-radius:18px; padding:14px 18px;
  }
  .admin-box > summary {
    cursor:pointer; font-weight:bold; color:#6a1b9a; font-size:1.1rem;
    padding:4px 0;
  }
  .admin-body { padding-top:8px; }
  .ext-row { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
  .ext-textarea {
    width:100%; min-height:180px; padding:12px 14px; border-radius:14px;
    border:2px solid #e0e0e0; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size:0.95rem; outline:none; resize:vertical;
  }
  .ext-textarea:focus { border-color:#ba68c8; }
  .preview-box {
    background:#fff8e1; border-radius:16px; padding:14px 16px; margin-top:14px;
    border:2px solid #ffd54f;
  }
  .preview-box h4 { color:#e65100; margin-bottom:6px; }

  .pin-card {
    background:#fff; border:2px solid #e1bee7; border-radius:18px;
    padding:18px 20px; margin-top:8px;
  }
  .pin-card h3 { color:#6a1b9a; margin-bottom:8px; }
  .pin-row {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;
  }
  .pin-row input {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 14px;
    font-size:1.4rem; font-family:inherit; outline:none;
    width:140px; text-align:center; letter-spacing:0.4em; direction:ltr;
  }
  .pin-row input:focus { border-color:#ba68c8; }
  .pin-error { color:#c62828; font-weight:bold; margin-top:8px; min-height:1.2em; }

  footer {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    margin-top: 24px;
  }
</style>
</head>
<body>

<header>
  <h1>רומנית עם חיוך <span class="flag">🇷🇴</span> 🌈</h1>
  <p class="subtitle">תרגול בין שיעורים — בהצלחה! ✨</p>
</header>

<div class="panel">
  <div class="stats">
    <div class="stat score"><span class="num" id="score">0</span><span class="lbl">⭐ נקודות</span></div>
    <div class="stat streak"><span class="num" id="streak">0</span><span class="lbl">🔥 ברצף</span></div>
    <div class="stat total"><span class="num" id="seen">0</span><span class="lbl">📚 תרגלת</span></div>
  </div>
</div>

<div class="panel">
  <div class="modes">
    <button data-mode="flash" class="active">🎴 כרטיסיות</button>
    <button data-mode="quiz">🎯 חידון</button>
    <button data-mode="listen">🔊 הקשבה</button>
    <button data-mode="match">🧩 התאמה</button>
    <button data-mode="sentences">🗣️ משפטים</button>
    <button data-mode="guide">📖 הגייה</button>
    <button data-mode="manage">📝 הוסיפי</button>
    <button data-mode="user">👤 שלי</button>
  </div>

  <div class="filter-row" id="filters"></div>

  <div id="content"></div>
</div>

<footer>נבנה באהבה ❤️ • לחיצה על המילה ברומנית = שמיעת ההגייה</footer>

const BUILTIN_VOCAB = VOCAB;  // alias — practice modes always use the merged list via getVocab()
const BUILTIN_CAT_EMOJI = { "ברכות": "👋", "אנשים": "👨‍👩‍👧", "צבעים": "🎨", "אוכל": "🍽️", "שונות": "✨" };
const USER_VOCAB_KEY = "ro-kids-user-vocab-v1";

// User-added words, persisted to localStorage. Shape: { id, he, ro, pron, cat, emoji, note }
let userVocab = [];
try {
  const raw = localStorage.getItem(USER_VOCAB_KEY);
  if (raw) userVocab = JSON.parse(raw);
} catch (e) { userVocab = []; }

function saveUserVocab() {
  try { localStorage.setItem(USER_VOCAB_KEY, JSON.stringify(userVocab)); } catch (e) {}
}
function getVocab() { return BUILTIN_VOCAB.concat(userVocab); }
function getCategories() {
  const cats = [];
  const seen = new Set();
  getVocab().forEach(w => { if (!seen.has(w.cat)) { seen.add(w.cat); cats.push(w.cat); } });
  return ["הכול"].concat(cats);
}
function getCategoryEmoji(cat) {
  if (cat === "הכול") return "🌈";
  return BUILTIN_CAT_EMOJI[cat] || "🏷️";
}

// ====== Helpers ======
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function filtered() {
  const v = getVocab();
  return state.category === "הכול" ? v : v.filter(w => w.cat === state.category);
}
function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return shuffle(pool).slice(0, n);
}
function pickOne(arr, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return pool[Math.floor(Math.random() * pool.length)];
}
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ro-RO";
  u.rate = 0.85;
  // Try to find a Romanian voice
  const voices = speechSynthesis.getVoices();
  const ro = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ro"));
  if (ro) u.voice = ro;
  speechSynthesis.speak(u);
}
// Pre-load voices (some browsers populate async)
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => {};
}

function confetti() {
  const emojis = ["🎉", "⭐", "✨", "🎊", "🌟", "💖", "🦋", "🌈"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + "vw";
    el.style.top = "-40px";
    el.style.animationDuration = (1 + Math.random() * 1.2) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }
}

function updateStats() {
  document.getElementById("score").textContent = state.score;
  document.getElementById("streak").textContent = state.streak;
  document.getElementById("seen").textContent = state.seen;
}

function pickFeedback(good) {
  const goods = ["מעולה! 🌟", "כל הכבוד! 💖", "כן! 🎉", "וואו! ✨", "מדהים! 🦋", "Foarte bine! 👏"];
  const bads  = ["אופס, נסי שוב 🤗", "כמעט! 💪", "לא נורא, ננסה עוד! 🌱", "פעם הבאה תפצחי 🔑"];
  return (good ? goods : bads)[Math.floor(Math.random() * (good ? goods.length : bads.length))];
}

// ====== Render: filters ======
function renderFilters() {
  const wrap = document.getElementById("filters");
  if (["guide", "manage", "sentences", "user"].includes(state.mode)) { wrap.innerHTML = ""; return; }
  const cats = getCategories();
  wrap.innerHTML = cats.map(c =>
    `<button class="chip ${state.category === c ? "active" : ""}" data-cat="${c}">${getCategoryEmoji(c)} ${c}</button>`
  ).join("");
  wrap.querySelectorAll(".chip").forEach(b => {
    b.onclick = () => {
      state.category = b.dataset.cat;
      resetModeState();
      render();
    };
  });
}

function resetModeState() {
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.quizCurrent = null;
  state.listenCurrent = null;
  state.matchPairs = [];
  state.matchSelected = null;
  state.matchMatched = new Set();
  state.sentenceIdx = 0;
  state.sentenceRevealed = false;
  state.sentenceOrder = shuffle(getSentences().map((_, i) => i));
  state.manageEditingId = null;
  state.manageDraft = null;
}

// ====== Render: flashcards ======
function renderFlash() {
  const list = filtered();
  if (list.length === 0) return "<p style='text-align:center'>אין מילים בקטגוריה הזו</p>";
  if (state.flashOrder.length === 0 || state.flashOrder.length !== list.length) {
    state.flashOrder = shuffle(list.map((_, i) => i));
  }
  const word = list[state.flashOrder[state.flashIdx]];
  const flipped = state.flashFlipped;

  return `
    <div class="flashcard-area">
      <p style="color:#888; font-size:0.95rem;">כרטיסייה ${state.flashIdx + 1} מתוך ${list.length} ${state.category !== "הכול" ? "(" + state.category + ")" : ""}</p>
      <div class="card" id="card">
        <div class="emoji">${word.emoji}</div>
        ${flipped ? `
          <div class="ro" id="ro-word">${word.ro}</div>
          <div class="pron">${word.pron}</div>
          <div class="note">${word.note}</div>
          <div class="hint">👆 לחיצה להפוך חזרה</div>
        ` : `
          <div class="he">${word.he}</div>
          <div class="hint">👆 לחיצה כדי לגלות את המילה ברומנית</div>
        `}
      </div>
      <div class="nav-row">
        <button class="btn prev" id="prev">⬅️ הקודמת</button>
        <button class="btn speak" id="speak">🔊 שמעי שוב</button>
        <button class="btn" id="next">הבאה ➡️</button>
        <button class="btn shuffle" id="shuffle">🔀 ערבבי</button>
      </div>
    </div>
  `;
}
function attachFlashEvents() {
  const list = filtered();
  const word = list[state.flashOrder[state.flashIdx]];
  document.getElementById("card").onclick = () => {
    state.flashFlipped = !state.flashFlipped;
    if (state.flashFlipped) {
      speak(word.ro);
      state.seen += 1;
      updateStats();
    }
    render();
  };
  document.getElementById("speak").onclick = (e) => { e.stopPropagation(); speak(word.ro); };
  document.getElementById("prev").onclick = () => {
    state.flashIdx = (state.flashIdx - 1 + list.length) % list.length;
    state.flashFlipped = false;
    render();
  };
  document.getElementById("next").onclick = () => {
    state.flashIdx = (state.flashIdx + 1) % list.length;
    state.flashFlipped = false;
    render();
  };
  document.getElementById("shuffle").onclick = () => {
    state.flashOrder = shuffle(list.map((_, i) => i));
    state.flashIdx = 0;
    state.flashFlipped = false;
    render();
  };
}

// ====== Render: quiz (he -> ro multiple choice) ======
function newQuiz() {
  const list = filtered();
  if (list.length < 4) return null;
  const correct = list[Math.floor(Math.random() * list.length)];
  const distractors = pickRandom(list, 3, correct);
  state.quizCurrent = correct;
  state.quizOptions = shuffle([correct, ...distractors]);
  state.quizAnswered = false;
}
function renderQuiz() {
  const list = filtered();
  if (list.length < 4) return "<p style='text-align:center'>צריכים לפחות 4 מילים. בחרי קטגוריה אחרת או 'הכול' 🌈</p>";
  if (!state.quizCurrent) newQuiz();
  const w = state.quizCurrent;
  return `
    <div class="quiz-q">
      <span class="emoji">${w.emoji}</span>
      ${w.he}
      <div class="prompt">איך אומרים את זה ברומנית? 🤔</div>
    </div>
    <div class="options" id="opts">
      ${state.quizOptions.map((o, i) => `<button class="opt" data-i="${i}">${o.ro}</button>`).join("")}
    </div>
    <div class="feedback" id="fb"></div>
    <div class="nav-row" id="nextRow" style="display:none">
      <button class="btn" id="nextQ">המשך ➡️</button>
    </div>
  `;
}
function attachQuizEvents() {
  document.querySelectorAll("#opts .opt").forEach(b => {
    b.onclick = () => {
      if (state.quizAnswered) return;
      const i = parseInt(b.dataset.i, 10);
      const picked = state.quizOptions[i];
      const correct = picked === state.quizCurrent;
      state.quizAnswered = true;
      state.seen += 1;
      speak(state.quizCurrent.ro);
      document.querySelectorAll("#opts .opt").forEach((bb, j) => {
        bb.disabled = true;
        const w = state.quizOptions[j];
        if (w === state.quizCurrent) bb.classList.add("correct");
        else if (j === i) bb.classList.add("wrong");
      });
      const fb = document.getElementById("fb");
      if (correct) {
        state.score += 10;
        state.streak += 1;
        if (state.streak > state.bestStreak) state.bestStreak = state.streak;
        fb.textContent = pickFeedback(true) + " (+10 ⭐)";
        fb.className = "feedback good";
        confetti();
      } else {
        state.streak = 0;
        fb.textContent = pickFeedback(false) + "  התשובה: " + state.quizCurrent.ro;
        fb.className = "feedback bad";
      }
      updateStats();
      document.getElementById("nextRow").style.display = "flex";
    };
  });
  const nextBtn = document.getElementById("nextQ");
  if (nextBtn) nextBtn.onclick = () => { newQuiz(); render(); };
}

// ====== Render: match game (6 pairs) ======
function newMatch() {
  const list = filtered();
  const n = Math.min(6, list.length);
  const picks = shuffle(list).slice(0, n);
  // Build two columns: left = he, right = ro, shuffled independently
  const left = shuffle(picks.map((w, i) => ({ side: "he", id: i, label: w.emoji + " " + w.he })));
  const right = shuffle(picks.map((w, i) => ({ side: "ro", id: i, label: w.ro })));
  state.matchPairs = { picks, left, right };
  state.matchSelected = null;
  state.matchMatched = new Set();
}
function renderMatch() {
  const list = filtered();
  if (list.length < 4) return "<p style='text-align:center'>צריכים לפחות 4 מילים. בחרי קטגוריה אחרת או 'הכול' 🌈</p>";
  if (!state.matchPairs.picks) newMatch();
  const { left, right, picks } = state.matchPairs;
  const matched = state.matchMatched;
  const allDone = matched.size === picks.length;
  return `
    <p style="text-align:center; color:#555;">לחצי על מילה בעברית ואז על המילה המתאימה ברומנית 🧩</p>
    <div class="match-grid" id="matchGrid" style="margin-top:12px;">
      ${left.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "he" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("he-" + item.id) ? "matched" : ""}" data-side="he" data-id="${item.id}">${item.label}</button>
        ${(() => {
          // pair each row: not strictly aligned because right is independent, but visually 2 cols works fine
          return "";
        })()}
      `).join("")}
    </div>
    <div class="match-grid" id="matchGrid2" style="margin-top:10px;">
      ${right.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "ro" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("ro-" + item.id) ? "matched" : ""}" data-side="ro" data-id="${item.id}">${item.label}</button>
      `).join("")}
    </div>
    <div class="feedback" id="fb">${allDone ? "🎉 כל הכבוד! מצאת את כל הזוגות!" : ""}</div>
    ${allDone ? `<div class="nav-row"><button class="btn" id="nextMatch">🔁 סבב חדש</button></div>` : ""}
  `;
}
function attachMatchEvents() {
  const { picks } = state.matchPairs;
  const handler = (btn) => {
    const side = btn.dataset.side;
    const id = parseInt(btn.dataset.id, 10);
    if (state.matchMatched.has(side + "-" + id)) return;
    if (!state.matchSelected) {
      state.matchSelected = { side, id };
      render();
      return;
    }
    if (state.matchSelected.side === side && state.matchSelected.id === id) {
      state.matchSelected = null;
      render();
      return;
    }
    // We have a previous selection — check match
    const a = state.matchSelected;
    const b = { side, id };
    if (a.side !== b.side && a.id === b.id) {
      state.matchMatched.add("he-" + a.id);
      state.matchMatched.add("ro-" + a.id);
      state.matchMatched.add("he-" + b.id);
      state.matchMatched.add("ro-" + b.id);
      state.score += 10;
      state.streak += 1;
      state.seen += 1;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      updateStats();
      speak(picks[a.id].ro);
      state.matchSelected = null;
      const allDone = state.matchMatched.size / 2 === picks.length;
      render();
      if (allDone) confetti();
    } else {
      state.streak = 0;
      updateStats();
      state.matchSelected = null;
      // brief shake feedback
      btn.classList.add("wrong");
      setTimeout(() => { render(); }, 350);
    }
  };
  document.querySelectorAll("#matchGrid .opt, #matchGrid2 .opt").forEach(b => {
    b.onclick = () => handler(b);
  });
  const nx = document.getElementById("nextMatch");
  if (nx) nx.onclick = () => { newMatch(); render(); };
}

// ====== Render: sentences ======
function knownWord(ro) {
  // Match against vocab (case-insensitive, strip punctuation)
  const norm = s => s.toLowerCase().replace(/[.,!?;:'"()\-]/g, "").trim();
  const n = norm(ro);
  return getVocab().some(w => norm(w.ro) === n);
}
function renderSentences() {
  const list = getSentences();
  if (list.length === 0) return "<p style='text-align:center'>אין משפטים. אפשר להוסיף ב-📝 הוסיפי</p>";

    state.sentenceOrder = shuffle(list.map((_, i) => i));
  }
  const s = list[state.sentenceOrder[state.sentenceIdx]];
  const revealed = state.sentenceRevealed;
  const wordsHtml = (s.words || []).map((w, i) => {
    const known = knownWord(w.ro);
    return `<button class="word-chip ${known ? "known" : "new"}" data-ro="${encodeURIComponent(w.ro)}">
      ${known ? "✅" : "🆕"} <b>${w.ro}</b> — ${w.he}
      <span class="word-pron">${w.pron}</span>
    </button>`;
  }).join("");
  return `
    <div style="text-align:center;">
      <p style="color:#888;">משפט ${state.sentenceIdx + 1} מתוך ${list.length} ${s.theme ? "· " + s.theme : ""}</p>
      <div class="card sentence-card" id="sentenceCard">
        <div class="emoji">${s.emoji || "💬"}</div>
        <div class="he" style="font-size:2rem;">${s.he}</div>
        ${revealed ? `
          <div class="ro" style="margin-top:14px; font-size:1.8rem;">${s.ro}</div>
          <div class="pron">${s.pron}</div>
        ` : `<div class="hint" style="margin-top:18px;">👆 לחיצה לגלות את המשפט ברומנית</div>`}
      </div>
      <div class="nav-row">
        <button class="btn prev" id="sPrev">⬅️ הקודם</button>
        <button class="btn speak" id="sSpeak">🔊 השמיעי</button>
        <button class="btn" id="sNext">הבא ➡️</button>
        <button class="btn shuffle" id="sShuffle">🔀 ערבבי</button>
      </div>
      ${revealed && s.words && s.words.length ? `
        <div class="words-breakdown">
          <h3>🔍 מילים מהמשפט</h3>
          <p class="hint" style="margin-bottom:10px;">לחיצה על כל מילה כדי לשמוע אותה</p>
          <div class="word-list">${wordsHtml}</div>
          <div class="legend">
            <span><span class="dot known"></span> כבר למדת</span>
            <span><span class="dot new"></span> מילה חדשה ללמוד</span>
          </div>
        </div>` : ""}

  `;
}
function attachSentenceEvents() {
  const list = getSentences();
  const s = list[state.sentenceOrder[state.sentenceIdx]];
  document.getElementById("sentenceCard").onclick = () => {
    state.sentenceRevealed = !state.sentenceRevealed;
    if (state.sentenceRevealed) { speak(s.ro); state.seen += 1; updateStats(); }
    render();
  };
  document.getElementById("sSpeak").onclick = (e) => { e.stopPropagation(); speak(s.ro); };
  document.getElementById("sPrev").onclick = () => {
    state.sentenceIdx = (state.sentenceIdx - 1 + list.length) % list.length;
    state.sentenceRevealed = false; render();
  };
  document.getElementById("sNext").onclick = () => {
    state.sentenceIdx = (state.sentenceIdx + 1) % list.length;
    state.sentenceRevealed = false; render();
  };
  document.getElementById("sShuffle").onclick = () => {
    state.sentenceOrder = shuffle(list.map((_, i) => i));

  document.querySelectorAll(".word-chip").forEach(b => {
    b.onclick = () => speak(decodeURIComponent(b.dataset.ro));
  });
}

function attachManageEvents() {
  document.querySelectorAll(".m-tab").forEach(b => {
    b.onclick = () => {
      state.manageTab = b.dataset.mtab;
      state.manageEditingId = null;
      state.manageDraft = null;
      render();
    };
  });

  // Collect inputs into a draft so render() doesn't lose typed-but-unsaved values when re-rendered
  const collect = () => {
    const get = id => (document.getElementById(id) || {}).value || "";
    if (state.manageTab === "words") {
      return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
               pron: get("f-pron").trim(), cat: get("f-cat").trim() || "שונות",
               emoji: get("f-emoji").trim() || "✨", note: get("f-note").trim() };
    }
    const wordsRaw = get("f-words");
    const words = wordsRaw.split("\n").map(line => {
      const parts = line.split("|").map(s => s.trim());
      if (parts.length < 2 || !parts[0] || !parts[1]) return null;
      return { ro: parts[0], he: parts[1], pron: parts[2] || "" };
    }).filter(Boolean);
    return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
             pron: get("f-pron").trim(), theme: get("f-theme").trim(),
             emoji: get("f-emoji").trim() || "💬", words };
  };

  const save = () => {
    const d = collect();
    if (!d.he || !d.ro) { alert("חובה למלא עברית ורומנית"); return; }
    const list = state.manageTab === "words" ? userVocab : userSentences;
    if (state.manageEditingId) {
      const i = list.findIndex(x => x.id === state.manageEditingId);
      if (i >= 0) list[i] = { ...list[i], ...d, id: state.manageEditingId };
    } else {
      d.id = "u" + Date.now() + Math.floor(Math.random() * 1000);
      list.push(d);
    }
    if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
    state.manageEditingId = null;
    state.manageDraft = null;
    // invalidate orders since vocab/sentence count changed
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentences().map((_, i) => i));
    render();
  };

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) saveBtn.onclick = save;
  const cancelBtn = document.getElementById("cancelBtn");
  if (cancelBtn) cancelBtn.onclick = () => {
    state.manageEditingId = null; state.manageDraft = null; render();
  };
  const testBtn = document.getElementById("testSpeak");
  if (testBtn) testBtn.onclick = () => {
    const ro = (document.getElementById("f-ro") || {}).value || "";
    if (ro) speak(ro);
  };

  // Row actions
  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const list = state.manageTab === "words" ? userVocab : userSentences;
      const item = list.find(x => x.id === id);
      if (!item) return;
      if (action === "speak") speak(item.ro);
      else if (action === "edit") {
        state.manageEditingId = id;
        state.manageDraft = { ...item };
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (action === "delete") {
        if (!confirm("למחוק את \"" + item.he + "\"?")) return;
        const i = list.findIndex(x => x.id === id);
        if (i >= 0) list.splice(i, 1);
        if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
        state.flashOrder = shuffle(filtered().map((_, i) => i));
        state.sentenceOrder = shuffle(getSentences().map((_, i) => i));
        render();
      }
    };
  });

  // Built-in speak
  document.querySelectorAll("[data-builtin-speak]").forEach(b => {
    b.onclick = () => speak(b.dataset.builtinSpeak);
  });

  // Export / import / reset
  const exportBtn = document.getElementById("exportBtn");
  if (exportBtn) exportBtn.onclick = () => {
    const data = { exportedAt: new Date().toISOString(), userVocab, userSentences, stats: { score: state.score, bestStreak: state.bestStreak, seen: state.seen } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "romanian-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };
  const importBtn = document.getElementById("importBtn");
  if (importBtn) importBtn.onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };
  const resetBtn = document.getElementById("resetBtn");
  if (resetBtn) resetBtn.onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };
}

// ====== Render: user / admin ======
// Pending preview from the bulk upload form, kept on the state so render() can show it
state.userPreview = null;

function newId() { return "u" + Date.now() + Math.floor(Math.random() * 1000000); }

// Parses a markdown table in the format the user paste:
// | קטגוריה | עברית | רומנית | הגייה | הערות |
// Category cells are sticky — empty category inherits previous.
function parseMarkdownTable(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  let currentCat = "";
  const words = [];
  for (const line of lines) {
    if (!line.startsWith("|")) continue;
    if (/^\|[\s:|\-]+$/.test(line)) continue; // separator like |---|---|
    let cells = line.split("|").map(c => c.trim().replace(/\*\*/g, "").replace(/__/g, ""));
    if (cells.length && cells[0] === "") cells.shift();
    if (cells.length && cells[cells.length - 1] === "") cells.pop();
    if (cells.length < 3) continue;
    const [cat, he, ro, pron, note] = cells;
    // Skip header rows
    if (/^רומנית/.test(ro) || /^Romanian/i.test(ro) || he === "עברית" || he === "Hebrew") continue;
    if (cat) currentCat = cat;
    if (!he || !ro) continue;
    words.push({
      id: newId() + "-" + words.length,
      he, ro,
      pron: pron || "",
      cat: currentCat || "מילון מורחב",
      emoji: "✨",
      note: note || "",
    });
  }
  return { words, sentences: [] };
}

// Parses JSON in several shapes:
//   - Existing export: { userVocab, userSentences }
//   - { words, sentences }
//   - Plain array → treated as words
function parseJsonDictionary(text) {
  const data = JSON.parse(text);
  let words = [], sentences = [];
  if (Array.isArray(data)) {
    words = data;
  } else if (data.userVocab !== undefined || data.userSentences !== undefined) {
    words = data.userVocab || [];
    sentences = data.userSentences || [];
  } else if (data.words !== undefined || data.sentences !== undefined) {
    words = data.words || [];
    sentences = data.sentences || [];
  } else {
    throw new Error("פורמט לא מזוהה");
  }
  words = (words || []).filter(w => w && w.he && w.ro).map(w => ({
    id: w.id || newId(),
    he: w.he, ro: w.ro,
    pron: w.pron || "",
    cat: w.cat || "מילון מורחב",
    emoji: w.emoji || "✨",
    note: w.note || "",
  }));
  sentences = (sentences || []).filter(s => s && s.he && s.ro).map(s => ({
    id: s.id || newId(),
    he: s.he, ro: s.ro,
    pron: s.pron || "",
    emoji: s.emoji || "💬",
    theme: s.theme || "",
    words: Array.isArray(s.words) ? s.words : [],
  }));
  return { words, sentences };
}

function parseExtension(text) {
  const trimmed = text.trim();
  if (!trimmed) throw new Error("הטקסט ריק");
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    return { type: "json", ...parseJsonDictionary(trimmed) };
  }
  if (trimmed.includes("|")) {
    return { type: "markdown", ...parseMarkdownTable(trimmed) };
  }
  throw new Error("לא זוהה פורמט. צריך JSON או טבלת Markdown");
}

// PIN gate — soft lock to keep the kid out of admin. localStorage stores plain text;
// this isn't real security, just a friction barrier.
const ADMIN_PIN_KEY = "ro-kids-admin-pin";
function getAdminPin() { try { return localStorage.getItem(ADMIN_PIN_KEY) || ""; } catch (e) { return ""; } }
function setAdminPin(pin) { try { localStorage.setItem(ADMIN_PIN_KEY, pin); } catch (e) {} }
function clearAdminPin() { try { localStorage.removeItem(ADMIN_PIN_KEY); } catch (e) {} }
function hasAdminPin() { return !!getAdminPin(); }

function renderPreview(preview) {
  const { type, words, sentences } = preview;
  const wPreview = words.slice(0, 8);
  const sPreview = sentences.slice(0, 5);
  return `
    <div class="preview-box">
      <h4>תצוגה מקדימה (${type === "json" ? "JSON" : "Markdown"})</h4>
      <p style="color:#555;">זוהו <b>${words.length}</b> מילים ו-<b>${sentences.length}</b> משפטים.</p>
      ${words.length ? `
        <table class="m-table">
          <tr><th>אימוג'י</th><th>עברית</th><th>רומנית</th><th>הגייה</th><th>קטגוריה</th></tr>
          ${wPreview.map(w => `<tr>
            <td>${w.emoji}</td><td>${escapeHtml(w.he)}</td>
            <td dir="ltr"><b>${escapeHtml(w.ro)}</b></td>
            <td>${escapeHtml(w.pron)}</td><td>${escapeHtml(w.cat)}</td>
          </tr>`).join("")}
          ${words.length > wPreview.length ? `<tr><td colspan="5" style="text-align:center; color:#888;">...ועוד ${words.length - wPreview.length} מילים</td></tr>` : ""}
        </table>
      ` : ""}
      ${sentences.length ? `
        <table class="m-table" style="margin-top:8px;">
          <tr><th></th><th>עברית</th><th>רומנית</th></tr>
          ${sPreview.map(s => `<tr>
            <td>${s.emoji}</td><td>${escapeHtml(s.he)}</td>
            <td dir="ltr"><b>${escapeHtml(s.ro)}</b></td>
          </tr>`).join("")}
          ${sentences.length > sPreview.length ? `<tr><td colspan="3" style="text-align:center; color:#888;">...ועוד ${sentences.length - sPreview.length} משפטים</td></tr>` : ""}
        </table>
      ` : ""}
      <div class="ext-row" style="margin-top:14px;">
        <button class="btn speak" id="extCommit">✅ הוסף לאוצר המילים שלי (${words.length + sentences.length})</button>
        <button class="btn prev" id="extCancel">❌ ביטול</button>
      </div>
    </div>
  `;
}

const SAMPLE_MARKDOWN = `| קטגוריה | עברית | רומנית | הגייה | הערות |
| :--- | :--- | :--- | :--- | :--- |
| **חיות** | חתול | Pisică | פִּיסִיקָה | מילה בנקבה |
|         | סוס  | Cal | קָאל | |
|         | ציפור | Pasăre | פָּסָרֶה | |
| **מספרים** | אחד | Unu | אוּנוּ | |
|         | שתיים | Doi | דוֹי | זכר; נקבה: Două |
|         | שלוש | Trei | טרֶיי | |`;

function attachUserEvents() {
  // PIN gate handlers
  const setBtn = document.getElementById("pinSetBtn");
  if (setBtn) {
    const newInp = document.getElementById("pin-new");
    const confInp = document.getElementById("pin-confirm");
    const submit = () => {
      const a = (newInp.value || "").trim();
      const b = (confInp.value || "").trim();
      if (!/^\d{4}$/.test(a)) { alert("הקוד חייב להיות 4 ספרות"); return; }
      if (a !== b) { alert("הקוד והאישור לא תואמים"); return; }
      setAdminPin(a);
      state.adminUnlocked = true;
      render();
    };
    setBtn.onclick = submit;
    confInp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
  }

  const unlockBtn = document.getElementById("pinUnlockBtn");
  if (unlockBtn) {
    const inp = document.getElementById("pin-in");
    const err = document.getElementById("pin-error");
    const submit = () => {
      if ((inp.value || "").trim() === getAdminPin()) {
        state.adminUnlocked = true;
        render();
      } else {
        err.textContent = "❌ קוד שגוי";
        inp.value = "";
        inp.focus();
      }
    };
    unlockBtn.onclick = submit;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    setTimeout(() => inp.focus(), 50);
  }

  const lockBtn = document.getElementById("pinLockBtn");
  if (lockBtn) lockBtn.onclick = () => { state.adminUnlocked = false; render(); };

  const changeBtn = document.getElementById("pinChangeBtn");
  if (changeBtn) changeBtn.onclick = () => {
    const cur = prompt("קוד נוכחי:");
    if (cur === null) return;
    if (cur !== getAdminPin()) { alert("קוד שגוי"); return; }
    const nw = prompt("קוד חדש (4 ספרות):");
    if (nw === null) return;
    if (!/^\d{4}$/.test(nw)) { alert("הקוד חייב להיות 4 ספרות"); return; }
    setAdminPin(nw);
    alert("הקוד עודכן ✨");
  };

  // If admin is locked, no further handlers to attach
  if (!state.adminUnlocked) return;

  const ta = document.getElementById("extInput");

  document.getElementById("extSample").onclick = () => { ta.value = SAMPLE_MARKDOWN; };
  document.getElementById("extClear").onclick  = () => { ta.value = ""; state.userPreview = null; render(); };

  document.getElementById("extFile").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json,.md,.txt,application/json,text/markdown,text/plain";
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        ta.value = r.result;
        tryParse();
      };
      r.readAsText(file);
    };
    inp.click();
  };

  const tryParse = () => {
    try {
      const result = parseExtension(ta.value);
      if (result.words.length === 0 && result.sentences.length === 0) {
        alert("לא נמצאו מילים או משפטים בטקסט.");
        return;
      }
      state.userPreview = result;
      render();
    } catch (e) {
      alert("שגיאה בקריאת הטקסט: " + e.message);
    }
  };
  document.getElementById("extParse").onclick = tryParse;

  const commitBtn = document.getElementById("extCommit");
  if (commitBtn) commitBtn.onclick = () => {
    const { words, sentences } = state.userPreview;
    userVocab = userVocab.concat(words);
    userSentences = userSentences.concat(sentences);
    saveUserVocab(); saveUserSentences();
    state.userPreview = null;
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentences().map((_, i) => i));
    alert(`נוספו ${words.length} מילים ו-${sentences.length} משפטים 🎉`);
    render();
  };
  const cancelBtn = document.getElementById("extCancel");
  if (cancelBtn) cancelBtn.onclick = () => { state.userPreview = null; render(); };

  document.getElementById("uExport").onclick = () => {
    const data = {
      exportedAt: new Date().toISOString(),
      userVocab, userSentences,
      stats: { score: state.score, bestStreak: state.bestStreak, seen: state.seen },
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "romanian-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  document.getElementById("uImport").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };

  document.getElementById("uResetVocab").onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };

  document.getElementById("uResetProgress").onclick = () => {
    if (!confirm("לאפס נקודות, רצף שיא ומונה תרגולים?")) return;
    state.score = 0; state.bestStreak = 0; state.streak = 0; state.seen = 0;
    try { localStorage.setItem("ro-kids-stats", JSON.stringify({})); } catch (e) {}
    render();
  };
}

function attachGuideEvents() {
  document.querySelectorAll("[data-ro]").forEach(b => {
    b.onclick = () => speak(b.dataset.ro);
  });
}

// ====== Master render ======
function render() {
  renderFilters();
  const content = document.getElementById("content");
  let html = "";
  if      (state.mode === "flash")     html = renderFlash();
  else if (state.mode === "quiz")      html = renderQuiz();
  else if (state.mode === "listen")    html = renderListen();
  else if (state.mode === "match")     html = renderMatch();
  else if (state.mode === "sentences") html = renderSentences();
  else if (state.mode === "guide")     html = renderGuide();
  else if (state.mode === "manage")    html = renderManage();
  else if (state.mode === "user")      html = renderUser();
  content.innerHTML = html;
  if      (state.mode === "flash")     attachFlashEvents();
  else if (state.mode === "quiz")      attachQuizEvents();
  else if (state.mode === "listen")    attachListenEvents();
  else if (state.mode === "match")     attachMatchEvents();
  else if (state.mode === "sentences") attachSentenceEvents();
  else if (state.mode === "guide")     attachGuideEvents();
  else if (state.mode === "manage")    attachManageEvents();
  else if (state.mode === "user")      attachUserEvents();
  updateStats();
}

// ====== Init ======
document.querySelectorAll(".modes button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".modes button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    state.mode = b.dataset.mode;
    resetModeState();
    render();
  };
});

// Load saved stats
try {
  const saved = JSON.parse(localStorage.getItem("ro-kids-stats") || "{}");
  if (saved.score) state.score = saved.score;
  if (saved.bestStreak) state.bestStreak = saved.bestStreak;
  if (saved.seen) state.seen = saved.seen;
} catch (e) {}

// Persist on unload
window.addEventListener("beforeunload", () => {
  try {
    localStorage.setItem("ro-kids-stats", JSON.stringify({
      score: state.score, bestStreak: state.bestStreak, seen: state.seen,
    }));
  } catch (e) {}
});

resetModeState();
render();
</script>

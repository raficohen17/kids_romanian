function speedLabel(rate) {
  return rate === 1.0 ? '×1' : `×${rate}`;
}

function wireLangPill() {
  const pill = document.getElementById('lang-pill');
  if (pill) pill.onclick = () => switchLanguage(state.language === 'en' ? 'ro' : 'en');
}

function wireSpeedPill() {
  const pill = document.getElementById('speed-pill');
  if (!pill) return;
  pill.onclick = () => {
    const idx = SPEECH_RATES.indexOf(state.speechRate);
    state.speechRate = SPEECH_RATES[(idx + 1) % SPEECH_RATES.length];
    try { localStorage.setItem('ro-kids-speech-rate', String(state.speechRate)); } catch (e) {}
    pill.innerHTML = `🐢 ${speedLabel(state.speechRate)}`;
  };
}

async function switchLanguage(newLang) {
  if (newLang === state.language) return;
  state.language = newLang;
  try { localStorage.setItem('ro-kids-language', newLang); } catch (e) {}
  // Reset shuffles + reload per-language progress
  if (isAuthed()) {
    await loadLanguageProgress();
  } else {
    loadGuestStatsForLanguage();
  }
  // Reset unit/practice state for the new language
  state.currentUnit = state.maxUnlockedUnit;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  state.storyOrder = [];
  state.flashIdx = 0; state.sentenceIdx = 0; state.storyIdx = 0;
  // Chat history is scoped to (profile, language); clear and let the chat
  // mode re-fetch on next entry.
  state.chatMessages = [];
  state.chatLoaded = false;
  state.chatError = null;
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  renderAuthBar();
  render();
}

async function loadLanguageProgress() {
  if (!isAuthed()) return;
  const { data: prog } = await auth.client.from('progress')
    .select('*')
    .eq('profile_id', auth.currentProfile.id)
    .eq('language', state.language)
    .maybeSingle();
  if (prog) {
    state.score = prog.score || 0;
    state.bestStreak = prog.best_streak || 0;
    state.seen = prog.seen || 0;
    state.maxUnlockedUnit = prog.max_unlocked_unit || 1;
  } else {
    state.score = 0; state.bestStreak = 0; state.seen = 0; state.maxUnlockedUnit = 1;
    try { await auth.client.from('progress').insert({ profile_id: auth.currentProfile.id, language: state.language, max_unlocked_unit: 1 }); } catch (e) {}
  }
  state.streak = 0;
}

function loadGuestStatsForLanguage() {
  try {
    const saved = JSON.parse(localStorage.getItem("ro-kids-stats-" + state.language) || "{}");
    state.score = saved.score || 0;
    state.bestStreak = saved.bestStreak || 0;
    state.seen = saved.seen || 0;
    state.maxUnlockedUnit = saved.maxUnlockedUnit || 1;
  } catch (e) {}
  state.streak = 0;
}

function attachOverlayEvents() {
  const cancel = document.getElementById('signin-cancel');
  if (cancel) cancel.onclick = () => { auth.view = auth.session ? 'app' : 'guest'; renderAuthOverlay(); };

  // Sign-in / sign-up tabs
  const tIn = document.getElementById('tab-signin');
  if (tIn) tIn.onclick = () => { auth.signinMode = 'signin'; renderAuthOverlay(); };
  const tUp = document.getElementById('tab-signup');
  if (tUp) tUp.onclick = () => { auth.signinMode = 'signup'; renderAuthOverlay(); };

  const submitBtn = document.getElementById('signin-submit');
  if (submitBtn) {
    const emailEl = document.getElementById('signin-email');
    const passEl  = document.getElementById('signin-password');
    const pass2El = document.getElementById('signin-password2');
    const fb      = document.getElementById('signin-feedback');
    const isSignup = auth.signinMode === 'signup';

    const submit = async () => {
      const email = (emailEl.value || '').trim();
      const password = (passEl.value || '');
      const password2 = pass2El ? (pass2El.value || '') : '';
      fb.textContent = '';
      if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) { fb.textContent = 'אימייל לא תקין'; return; }
      if (password.length < 6) { fb.textContent = 'סיסמה חייבת 6+ תווים'; return; }
      if (isSignup && password !== password2) { fb.textContent = 'הסיסמאות לא תואמות'; return; }

      submitBtn.disabled = true; submitBtn.textContent = '...';
      const result = isSignup
        ? await signUpWithPassword(email, password)
        : await signInWithPassword(email, password);
      submitBtn.disabled = false;

      if (result.error) {
        fb.textContent = result.error.message || 'שגיאה';
        submitBtn.textContent = isSignup ? 'הרשמה' : 'כניסה';
        return;
      }
      // onAuthStateChange will route the rest
    };
    submitBtn.onclick = submit;
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    if (pass2El) pass2El.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    emailEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') passEl.focus();
    });
    setTimeout(() => emailEl.focus(), 50);
  }

  const magic = document.getElementById('signin-magic');
  if (magic) magic.onclick = (e) => {
    e.preventDefault();
    const email = (document.getElementById('signin-email').value || '').trim();
    if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
      document.getElementById('signin-feedback').textContent = 'הזיני אימייל קודם';
      return;
    }
    signInMagicLink(email);
  };

  const oc = document.getElementById('open-contact');
  if (oc) oc.onclick = (e) => { e.preventDefault(); openContactModal(); };

  document.querySelectorAll('.picker-tile[data-id]').forEach(tile => {
    tile.onclick = () => {
      const p = auth.profiles.find(x => x.id === tile.dataset.id);
      if (!p) return;
      if (p.pin) { auth.pendingPinProfile = p; auth.view = 'pin'; renderAuthOverlay(); }
      else selectProfile(p);
    };
  });
  const addP = document.getElementById('add-profile');
  if (addP) addP.onclick = createProfileFlow;
  const mp = document.getElementById('manage-profiles');
  if (mp) mp.onclick = manageProfilesFlow;

  const pinSubmit = document.getElementById('pin-submit');
  if (pinSubmit) {
    const inp = document.getElementById('pin-entry');
    const err = document.getElementById('pin-err');
    const submit = () => {
      const v = (inp.value || '').trim();
      if (v === auth.pendingPinProfile.pin) {
        const p = auth.pendingPinProfile;
        auth.pendingPinProfile = null;
        selectProfile(p);
      } else {
        err.textContent = '❌ קוד שגוי';
        inp.value = ''; inp.focus();
      }
    };
    pinSubmit.onclick = submit;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    setTimeout(() => inp.focus(), 50);
    document.getElementById('pin-back').onclick = () => { auth.pendingPinProfile = null; auth.view = 'picker'; renderAuthOverlay(); };
  }
}

// 20 curated emojis suitable for kid profile avatars — gender/culture neutral.
const PROFILE_EMOJIS = [
  '🌟','⭐','🌈','✨','🌸','🌻','🍀','🦋',
  '🐱','🐶','🦊','🐰','🐻','🐼','🦁','🐯',

];

// Renders an emoji-picker modal on the contact-modal div (reusing the same overlay slot).
// Resolves to the selected emoji string, or null if cancelled.
function openEmojiPicker({ current } = {}) {
  return new Promise(resolve => {
    const m = document.getElementById('contact-modal');
    if (!m) return resolve(null);
    m.hidden = false;
    m.innerHTML = `
      <div class="auth-card" style="max-width:380px;">
        <h2>בחרי אימוג'י</h2>
        <div class="emoji-grid">
          ${PROFILE_EMOJIS.map(e => `
            <button class="emoji-tile ${e === current ? 'selected' : ''}" data-e="${e}">${e}</button>
          `).join('')}
        </div>
        <div class="row" style="margin-top:14px;">
          <button class="btn prev" id="emoji-cancel">ביטול</button>
        </div>
      </div>
    `;
    const close = (val) => { m.hidden = true; m.innerHTML = ''; resolve(val); };
    m.querySelectorAll('.emoji-tile').forEach(b => {
      b.onclick = () => close(b.dataset.e);

  });
}

async function createProfileFlow() {
  if (auth.profiles.length >= 10) { alert('עד 10 פרופילים למשפחה'); return; }
  const name = prompt('שם הפרופיל:');
  if (!name) return;
  const picked = await openEmojiPicker({ current: '🌟' });
  const emoji = picked || '🌟';
  const { data, error } = await auth.client.from('profiles').insert({
    family_id: auth.family.id, name: name.trim(), emoji,
  }).select().single();
  if (error) { alert('שגיאה: ' + error.message); return; }
  auth.profiles.push(data);
  renderAuthOverlay();
}

async function manageProfilesFlow() {
  const list = auth.profiles.map((p, i) => `${i + 1}. ${p.emoji || '🌟'} ${p.name}${p.pin ? ' 🔒' : ''}`).join('\n');
  const idx = prompt('בחרי פרופיל לעריכה (מספר):\n\n' + list);
  if (!idx) return;
  const i = parseInt(idx, 10) - 1;
  const p = auth.profiles[i];
  if (!p) return;
  const action = prompt(`פרופיל: ${p.emoji || '🌟'} ${p.name}\n\n1 = שנה שם\n2 = שנה אימוג'י\n3 = ${p.pin ? 'הסר' : 'הגדר'} PIN\n4 = מחק`);
  if (action === '1') {
    const nn = prompt('שם חדש:', p.name);
    if (nn) { await auth.client.from('profiles').update({ name: nn.trim() }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); renderAuthBar(); }
  } else if (action === '2') {
    const ne = await openEmojiPicker({ current: p.emoji || '🌟' });
    if (ne) { await auth.client.from('profiles').update({ emoji: ne }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); renderAuthBar(); }
  } else if (action === '3') {
    if (p.pin) {
      if (confirm('להסיר PIN?')) { await auth.client.from('profiles').update({ pin: null }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); }
    } else {
      const np = prompt('PIN חדש (4 ספרות):');
      if (np && /^\d{4}$/.test(np)) { await auth.client.from('profiles').update({ pin: np }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); }
      else if (np) alert('PIN חייב להיות 4 ספרות');
    }
  } else if (action === '4') {
    if (confirm(`למחוק את ${p.name}? פעולה בלתי הפיכה.`)) {
      await auth.client.from('profiles').delete().eq('id', p.id);
      await loadProfiles();
      if (auth.currentProfile && auth.currentProfile.id === p.id) {
        auth.currentProfile = null; auth.view = 'picker';
      }
      renderAuthOverlay(); renderAuthBar();
    }
  }
}

// --- Admin Requests tab ---
function applyModeVisibility() {
  // Add/remove the "requests" tab based on admin status
  const modes = document.querySelector('.modes');
  if (!modes) return;
  let req = modes.querySelector('[data-mode="requests"]');
  if (auth.isAdmin) {
    if (!req) {
      req = document.createElement('button');
      req.setAttribute('data-mode', 'requests');
      req.textContent = '📥 בקשות';
      req.onclick = () => activateMode(req);
      modes.appendChild(req);
    }
  } else if (req) {
    req.remove();
  }
  // Show the chat tab only when a profile is selected. Guests have no chat.
  const chatBtn = modes.querySelector('[data-mode="chat"]');
  if (chatBtn) {
    const show = !!(auth.session && auth.currentProfile);
    chatBtn.hidden = !show;
    if (!show && state.mode === 'chat') {
      state.mode = 'flash';
      document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
      const flashBtn = modes.querySelector('[data-mode="flash"]');
      if (flashBtn) flashBtn.classList.add('active');
    }
  }
  updateRequestsBadge();
}

function activateMode(btn) {
  document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  state.mode = btn.dataset.mode;
  resetModeState();
  render();
}

function renderRequests() {
  return `
    <h2 style="text-align:center; color:#d81b60; margin-bottom:12px;">📥 בקשות גישה</h2>
    <div id="req-list" style="margin-top:10px;">טוען...</div>
  `;
}

async function attachRequestsEvents() {
  const list = document.getElementById('req-list');
  if (!list) return;
  const { data, error } = await auth.client.from('access_requests')
    .select('*').order('created_at', { ascending: false });
  if (error) { list.innerHTML = 'שגיאה: ' + escapeHtml(error.message); return; }
  if (!data || !data.length) { list.innerHTML = '<p>אין בקשות.</p>'; return; }
  list.innerHTML = data.map(r => `
    <div class="request-row ${r.status}">
      <div><b>${escapeHtml(r.email)}</b>${r.name ? ' · ' + escapeHtml(r.name) : ''}</div>
      ${r.message ? `<div style="margin-top:4px;">${escapeHtml(r.message)}</div>` : ''}
      <div class="request-meta">${new Date(r.created_at).toLocaleString('he-IL')} · ${r.status}</div>
      ${r.status === 'pending' ? `<div style="margin-top:8px; display:flex; gap:8px;">
        <button class="btn speak" data-action="approve" data-id="${r.id}" data-email="${escapeAttr(r.email)}">✅ אשרי</button>
        <button class="btn prev"  data-action="reject"  data-id="${r.id}">❌ דחי</button>
      </div>` : ''}
    </div>
  `).join('');
  list.querySelectorAll('[data-action]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.id;
      const action = b.dataset.action;
      if (action === 'approve') {
        const email = (b.dataset.email || '').toLowerCase();
        try { await auth.client.from('allowed_emails').upsert({ email, added_by: auth.session.user.id }); } catch (e) {}
        await auth.client.from('access_requests').update({ status: 'approved', reviewed_at: new Date().toISOString() }).eq('id', id);
      } else {
        await auth.client.from('access_requests').update({ status: 'rejected', reviewed_at: new Date().toISOString() }).eq('id', id);
      }
      auth.unreadRequests = Math.max(0, auth.unreadRequests - 1);
      updateRequestsBadge();
      attachRequestsEvents();
    };
  });
  auth.unreadRequests = 0;
  updateRequestsBadge();
}

function subscribeAdminRealtime() {
  if (!auth.client || !auth.isAdmin || auth.realtimeChannel) return;
  auth.realtimeChannel = auth.client.channel('access_requests_new')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'access_requests' },
      () => { auth.unreadRequests += 1; updateRequestsBadge(); })
    .subscribe();
  auth.client.from('access_requests').select('id', { count: 'exact', head: true }).eq('status', 'pending')
    .then(({ count }) => { auth.unreadRequests = count || 0; updateRequestsBadge(); });
}

function updateRequestsBadge() {
  const btn = document.querySelector('.modes button[data-mode="requests"]');
  if (!btn) return;
  btn.innerHTML = auth.unreadRequests > 0
    ? `📥 בקשות <span class="req-dot"></span>${auth.unreadRequests}`
    : '📥 בקשות';
}

// ====== Init ======
document.querySelectorAll(".modes button").forEach(b => {
  b.onclick = () => activateMode(b);
});

// Load saved guest stats (will be overridden by Supabase if authed)
loadGuestStats();

// Persist guest stats on unload (no-op for authed since progress is on server)
window.addEventListener("beforeunload", () => {
  if (isAuthed()) return;
  try {
    localStorage.setItem("ro-kids-stats-" + state.language, JSON.stringify({
      score: state.score, bestStreak: state.bestStreak, seen: state.seen, maxUnlockedUnit: state.maxUnlockedUnit,
    }));
  } catch (e) {}
});

resetModeState();
render();

// Boot auth: wait for SDK if pending
if (window._supabase !== undefined) initAuth();
else window.addEventListener("supabase-ready", initAuth, { once: true });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לתרגל שפות עם חיוך 🌈</title>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><radialGradient id="bg" cx="50%25" cy="35%25" r="65%25"><stop offset="0%25" stop-color="%23fff9c4"/><stop offset="60%25" stop-color="%23fce4ec"/><stop offset="100%25" stop-color="%23e3f2fd"/></radialGradient></defs><circle cx="32" cy="32" r="30" fill="url(%23bg)" stroke="%23ba68c8" stroke-width="3"/><path d="M14 38a18 18 0 0 1 36 0" fill="none" stroke="%23e53935" stroke-width="3.5" stroke-linecap="round"/><path d="M18 38a14 14 0 0 1 28 0" fill="none" stroke="%23fbc02d" stroke-width="3.5" stroke-linecap="round"/><path d="M22 38a10 10 0 0 1 20 0" fill="none" stroke="%2343a047" stroke-width="3.5" stroke-linecap="round"/><path d="M26 38a6 6 0 0 1 12 0" fill="none" stroke="%231e88e5" stroke-width="3.5" stroke-linecap="round"/><circle cx="24" cy="46" r="2.2" fill="%234a148c"/><circle cx="40" cy="46" r="2.2" fill="%234a148c"/><path d="M24 51c3 3 13 3 16 0" fill="none" stroke="%234a148c" stroke-width="2.5" stroke-linecap="round"/></svg>'>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Arial Hebrew", Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #fff9c4 100%);
    color: #333;
    direction: rtl;
  }
  body { padding: 16px; padding-bottom: 80px; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 { font-size: 2.2rem; color: #d81b60; }
  h1 .flag { font-size: 1.8rem; }
  .subtitle { color: #555; margin-top: 4px; font-size: 1.05rem; }

  .panel {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    max-width: 720px;
    margin: 0 auto 16px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat {
    background: linear-gradient(135deg, #f8bbd0, #ce93d8);
    border-radius: 16px;
    padding: 10px 16px;
    text-align: center;
    color: white;
    font-weight: bold;
    min-width: 100px;
  }
  .stat .num { font-size: 1.6rem; display: block; }
  .stat .lbl { font-size: 0.85rem; opacity: 0.95; }
  .stat.streak { background: linear-gradient(135deg, #ff7043, #ffa726); }
  .stat.score  { background: linear-gradient(135deg, #66bb6a, #26c6da); }
  .stat.total  { background: linear-gradient(135deg, #5c6bc0, #42a5f5); }

  /* mode tabs */
  .modes {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .modes button {
    background: white;
    border: 3px solid #e0e0e0;
    border-radius: 18px;
    padding: 10px 18px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .modes button:hover { border-color: #ba68c8; transform: translateY(-2px); }
  .modes button.active {
    background: linear-gradient(135deg, #ba68c8, #7e57c2);
    color: white;
    border-color: transparent;
  }

  /* category filter */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }
  .chip {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chip.active {
    background: #fff59d;
    border-color: #fbc02d;
    font-weight: bold;
  }

  /* flashcard */
  .flashcard-area { text-align: center; }
  .card {
    background: linear-gradient(135deg, #fff, #f3e5f5);
    border-radius: 28px;
    padding: 40px 24px;
    margin: 16px auto;
    max-width: 480px;
    min-height: 260px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(126, 87, 194, 0.18);
    border: 4px solid #ce93d8;
    transition: transform 0.25s;
    user-select: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .card:active { transform: scale(0.98); }
  .card .emoji { font-size: 4rem; margin-bottom: 12px; }
  .card .he { font-size: 2.4rem; font-weight: bold; color: #4527a0; }
  .card .ro { font-size: 2.2rem; font-weight: bold; color: #c2185b; margin-bottom: 8px; }
  .card .pron { font-size: 1.3rem; color: #555; margin-bottom: 12px; }
  .card .note { font-size: 0.95rem; color: #888; font-style: italic; max-width: 380px; }
  .card .hint { color: #999; margin-top: 14px; font-size: 0.9rem; }

  .nav-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 12px 22px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn.speak { background: linear-gradient(135deg, #66bb6a, #43a047); }
  .btn.prev  { background: linear-gradient(135deg, #ab47bc, #8e24aa); }
  .btn.shuffle { background: linear-gradient(135deg, #ff7043, #f4511e); }

  /* quiz */
  .quiz-q {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #4527a0;
    margin: 12px 0 4px;
  }
  .quiz-q .emoji { font-size: 2.2rem; display: block; margin-bottom: 4px; }
  .quiz-q .prompt { font-size: 1rem; color: #777; font-weight: normal; margin-top: 4px;}
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }
  .opt {
    background: white;
    border: 3px solid #e1bee7;
    border-radius: 18px;
    padding: 16px;
    font-size: 1.3rem;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: #4a148c;
    transition: all 0.12s;
  }
  .opt:hover { background: #f3e5f5; transform: translateY(-2px); }
  .opt.correct {
    background: linear-gradient(135deg, #a5d6a7, #66bb6a);
    color: white;
    border-color: #2e7d32;
    animation: pop 0.4s;
  }
  .opt.wrong {
    background: linear-gradient(135deg, #ef9a9a, #e57373);
    color: white;
    border-color: #c62828;
    animation: shake 0.4s;
  }
  .opt:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 1.4rem;
    font-weight: bold;
    min-height: 1.6rem;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad  { color: #c62828; }

  /* match game */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .match-grid .opt {
    font-size: 1.15rem;
    padding: 14px 10px;
    min-height: 56px;
  }
  .match-grid .opt.selected {
    background: linear-gradient(135deg, #fff59d, #ffee58);
    border-color: #fbc02d;
  }
  .match-grid .opt.matched {
    background: linear-gradient(135deg, #c5e1a5, #aed581);
    border-color: #689f38;
    color: #33691e;
    opacity: 0.6;
    pointer-events: none;
  }

  /* pronunciation guide */
  .guide {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    background: #fff8e1;
    border-radius: 16px;
    padding: 16px 20px;
    margin-top: 8px;
  }
  .guide .letter {
    font-weight: bold;
    color: #c2185b;
    font-size: 1.2rem;
  }
  .guide .desc { color: #555; }

  /* confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    font-size: 1.8rem;
    animation: fall 1.6s linear forwards;
    z-index: 9999;
  }
  @keyframes fall {
    to { transform: translateY(100vh) rotate(540deg); opacity: 0; }
  }

  .end-screen {
    text-align: center;
    padding: 24px;
  }
  .end-screen .big { font-size: 5rem; }
  .end-screen h2 { color: #d81b60; margin: 12px 0; }

  /* listen mode */
  .listen-area {
    text-align: center;
  }
  .listen-btn {
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    border: none;
    border-radius: 50%;
    width: 140px;
    height: 140px;
    font-size: 4rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(67, 160, 71, 0.4);
    margin: 20px auto;
    display: block;
    transition: transform 0.15s;
  }
  .listen-btn:hover { transform: scale(1.05); }
  .listen-btn:active { transform: scale(0.95); }

  /* sentences */
  .sentence-card { padding: 28px 20px; }
  .words-breakdown {
    background: #fff8e1;
    border-radius: 20px;
    padding: 16px 18px;
    margin-top: 18px;
    text-align: right;
  }
  .words-breakdown h3 { color: #c2185b; margin-bottom: 6px; }
  .word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .word-chip {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    text-align: right;
    flex: 1 1 calc(50% - 8px);
    min-width: 180px;
  }
  .word-chip.known { border-color: #aed581; background: #f1f8e9; }
  .word-chip.new   { border-color: #ffb74d; background: #fff3e0; }
  .word-chip b { color: #c2185b; }
  .word-pron { display:block; color: #777; font-size: 0.9rem; margin-top: 2px; }
  .legend {
    display:flex; gap:14px; justify-content:center; margin-top:12px;
    font-size:0.9rem; color:#555;
  }
  .legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-left:4px; vertical-align:middle; }
  .legend .dot.known { background:#aed581; }
  .legend .dot.new   { background:#ffb74d; }

  /* stories */
  .story-card {
    background: white; border: 4px solid #ce93d8; border-radius: 24px;
    padding: 22px 18px; margin-top: 12px; text-align: center;
  }
  .story-title { color:#6a1b9a; font-size: 1.4rem; font-weight: bold; margin-bottom: 12px; }
  .story-text {
    direction: ltr; font-size: 1.7rem; line-height: 2.2; color:#333;
    text-align: center; padding: 8px 0;
  }
  .story-sentence { display:block; margin: 8px 0; position: relative; }
  .story-sentence-play {
    background: linear-gradient(135deg, #c8e6c9, #a5d6a7);
    border: 2px solid #66bb6a; border-radius: 50%;
    width: 34px; height: 34px; padding: 0;
    margin-inline-end: 8px; cursor: pointer; font-size: 1rem;
    vertical-align: middle;
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 0.1s;
  }
  .story-sentence-play:hover { transform: scale(1.08); }
  .story-sentence-play:active { transform: scale(0.94); }
  .story-word {
    position: relative; display: inline-block; padding: 2px 4px;
    border-radius: 8px; cursor: pointer; transition: background 0.1s;
    border: 2px solid transparent;
  }
  .story-word.active {
    background: linear-gradient(135deg, #fff59d, #ffeb3b);
    border-color: #fbc02d; box-shadow: 0 2px 6px rgba(251,192,45,0.4);
  }
  .story-word.tap-open { background:#fff3e0; border-color:#ffb74d; }
  @media (hover:hover) {
    .story-word:hover { background:#f3e5f5; border-color:#ba68c8; }
  }
  .story-tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    background: #4a148c; color: white;
    padding: 8px 14px; border-radius: 12px;
    font-size: 1rem; line-height: 1.3; white-space: nowrap;
    direction: rtl; text-align: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    pointer-events: none; opacity: 0; transition: opacity 0.12s;
    z-index: 50;
  }
  .story-tooltip .tt-pron {
    display:block; font-size: 0.9rem; color:#e1bee7; margin-top:2px;
  }
  .story-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #4a148c;
  }
  @media (hover:hover) {
    .story-word:hover .story-tooltip { opacity: 1; }
  }
  .story-word.tap-open .story-tooltip { opacity: 1; }
  .story-pron {
    direction: rtl; font-size: 1.1rem; color:#666;
    margin-top: 12px; line-height: 1.6;
  }
  .story-pron-line { display:block; }
  .story-he {
    color:#c2185b; font-size: 1.15rem; margin-top: 14px;
    line-height: 1.6; direction: rtl;
  }
  .story-he-line { display:block; }

  /* chat */
  .chat-wrap {
    max-width: 720px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 10px;
  }
  .chat-toolbar {
    display: flex; justify-content: flex-end;
  }
  .chat-reset {
    background: white; border: 2px solid #ef9a9a; border-radius: 12px;
    color: #c62828; padding: 6px 12px; cursor: pointer;
    font-family: inherit; font-weight: bold; font-size: 0.9rem;
  }
  .chat-reset:hover:not(:disabled) { background: #ffebee; }
  .chat-reset:disabled { opacity: 0.4; cursor: not-allowed; }
  .chat-list {
    background: rgba(255,255,255,0.6); border-radius: 16px;
    padding: 14px; min-height: 280px; max-height: 60vh;
    overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
  }
  .chat-bubble {
    padding: 10px 14px; border-radius: 18px; max-width: 85%;
    font-size: 1.1rem; line-height: 1.5; word-wrap: break-word;
    position: relative;
  }
  .chat-user {
    background: linear-gradient(135deg, #b3e5fc, #81d4fa);
    color: #01579b; align-self: flex-start;
    border-bottom-left-radius: 6px;
    direction: ltr; text-align: left;
  }
  .chat-llm {
    background: linear-gradient(135deg, #fff3e0, #ffe0b2);
    color: #4a148c; align-self: flex-end;
    border-bottom-right-radius: 6px;
    padding-top: 32px;
  }
  .chat-bubble-text { direction: ltr; text-align: left; }
  .chat-bubble-actions {
    position: absolute; top: 6px; right: 8px;
    display: flex; gap: 4px;
  }
  .chat-tx {
    background: white; border: 1px solid #ce93d8;
    border-radius: 50%; width: 26px; height: 26px;
    padding: 0; cursor: pointer; font-size: 0.85rem;
    line-height: 1; display: inline-flex; align-items: center; justify-content: center;
  }
  .chat-tx:hover { background: #f3e5f5; }
  .chat-bubble-he {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed #ba68c8;
    direction: rtl; text-align: right;
    color: #6a1b9a; font-size: 1rem;
  }
  .chat-pending {
    display: inline-flex; gap: 6px; align-items: center;
    padding: 14px 18px; min-width: 0;
  }
  .chat-pending .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ba68c8; animation: chatBounce 1.2s infinite ease-in-out;
  }
  .chat-pending .dot:nth-child(2) { animation-delay: 0.2s; }
  .chat-pending .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes chatBounce {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40%           { opacity: 1;   transform: translateY(-4px); }
  }
  .chat-composer {
    display: flex; gap: 8px; align-items: center;
  }
  .chat-composer input[type="text"] {
    flex: 1; padding: 10px 14px; font-size: 1.05rem;
    border: 2px solid #ba68c8; border-radius: 16px;
    direction: ltr; font-family: inherit;
  }
  .chat-composer input[type="text"]:disabled { opacity: 0.6; }
  .chat-error {
    background: #ffebee; color: #c62828;
    border: 2px solid #ef9a9a; border-radius: 14px;
    padding: 8px 12px; font-size: 0.95rem; text-align: center;
  }

  /* manage */
  .manage-tabs {
    display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;
  }
  .m-tab {
    background:white; border:3px solid #e0e0e0; border-radius:14px;
    padding:8px 16px; font-weight:bold; cursor:pointer; font-family:inherit; font-size:1rem;
  }
  .m-tab.active { background:linear-gradient(135deg,#ffb74d,#fb8c00); color:white; border-color:transparent; }
  .m-heading { color:#4527a0; margin:18px 0 10px; }
  .form-grid {
    display:grid; grid-template-columns: 1fr 1fr; gap:10px;
  }
  @media (max-width:520px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid label {
    display:flex; flex-direction:column; font-weight:bold; color:#555; font-size:0.95rem; gap:4px;
  }
  .form-grid input, .words-textarea {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 12px; font-size:1.05rem;
    font-family:inherit; outline:none; transition: border-color 0.15s;
  }
  .form-grid input:focus, .words-textarea:focus { border-color:#ba68c8; }
  .words-textarea { width:100%; min-height:120px; margin-top:8px; resize:vertical; direction:ltr; }
  .req { color:#e53935; }
  .m-table {
    width:100%; border-collapse:collapse; margin-top:8px; background:white; border-radius:12px; overflow:hidden;
  }
  .m-table th { background:#f3e5f5; color:#4a148c; padding:8px 6px; font-size:0.9rem; text-align:right; }
  .m-table td { padding:8px 6px; border-bottom:1px solid #f0f0f0; font-size:0.95rem; }
  .row-actions { display:flex; gap:4px; justify-content:flex-end; }
  .mini {
    background:white; border:2px solid #e0e0e0; border-radius:10px; padding:4px 8px;
    cursor:pointer; font-size:0.95rem; font-family:inherit;
  }
  .mini:hover { border-color:#ba68c8; }
  .mini.danger:hover { border-color:#e53935; background:#ffebee; }
  .empty-note { color:#888; text-align:center; padding:16px; background:#fafafa; border-radius:12px; }
  .io-row { display:flex; gap:8px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .builtin-list { margin-top:16px; background:#fafafa; border-radius:12px; padding:8px 14px; }
  .builtin-list summary { cursor:pointer; font-weight:bold; color:#555; }
  code { background:#f3e5f5; padding:2px 6px; border-radius:6px; font-size:0.9rem; }

  /* user / admin tab */
  .user-stats {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap:10px; margin-bottom:20px;
  }
  .ustat {
    background: linear-gradient(135deg, #fce4ec, #e1bee7);
    border-radius:16px; padding:14px 8px; text-align:center;
    color:#4a148c; font-weight:bold;
  }
  .ustat .big { font-size:1.8rem; color:#d81b60; }

  .admin-box {
    background: #fafafa;
    border: 2px dashed #ce93d8;
    border-radius:18px; padding:14px 18px;
  }
  .admin-box > summary {
    cursor:pointer; font-weight:bold; color:#6a1b9a; font-size:1.1rem;
    padding:4px 0;
  }
  .admin-body { padding-top:8px; }
  .ext-row { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
  .ext-textarea {
    width:100%; min-height:180px; padding:12px 14px; border-radius:14px;
    border:2px solid #e0e0e0; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size:0.95rem; outline:none; resize:vertical;
  }
  .ext-textarea:focus { border-color:#ba68c8; }
  .preview-box {
    background:#fff8e1; border-radius:16px; padding:14px 16px; margin-top:14px;
    border:2px solid #ffd54f;
  }
  .preview-box h4 { color:#e65100; margin-bottom:6px; }

  .pin-card {
    background:#fff; border:2px solid #e1bee7; border-radius:18px;
    padding:18px 20px; margin-top:8px;
  }
  .pin-card h3 { color:#6a1b9a; margin-bottom:8px; }
  .pin-row {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;
  }
  .pin-row input {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 14px;
    font-size:1.4rem; font-family:inherit; outline:none;

// ====== Helpers ======
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// A vocab/sentence row is "in scope" if it has no `unit` (Starter Pack or
// user-added) or its unit number is <= the kid's currently-selected unit.
function inUnitScope(row) {
  return row.unit == null || row.unit <= state.currentUnit;
}

function filtered() {
  const v = getVocab().filter(inUnitScope);
  return state.category === "הכול" ? v : v.filter(w => w.cat === state.category);
}
function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return shuffle(pool).slice(0, n);
}
function pickOne(arr, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return pool[Math.floor(Math.random() * pool.length)];
}
function ttsLang() { return state.language === 'en' ? 'en-US' : 'ro-RO'; }
// Hebrew name for the current target language (for hint text inside the kid's UI)
function targetLangNameHe() { return state.language === 'en' ? 'אנגלית' : 'רומנית'; }
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = ttsLang();
  u.rate = state.speechRate;
  // Try to find a voice matching the active language
  const voices = speechSynthesis.getVoices();
  const prefix = state.language === 'en' ? 'en' : 'ro';
  const match = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
  if (match) u.voice = match;
  speechSynthesis.speak(u);
}
// Pre-load voices (some browsers populate async)
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => {};
}

function confetti() {
  const emojis = ["🎉", "⭐", "✨", "🎊", "🌟", "💖", "🦋", "🌈"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + "vw";
    el.style.top = "-40px";
    el.style.animationDuration = (1 + Math.random() * 1.2) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }
}

  if (typeof maybeUnlockNextUnit === 'function') maybeUnlockNextUnit();

function pickFeedback(good) {
  const goods = ["מעולה! 🌟", "כל הכבוד! 💖", "כן! 🎉", "וואו! ✨", "מדהים! 🦋", "Foarte bine! 👏"];
  const bads  = ["אופס, נסי שוב 🤗", "כמעט! 💪", "לא נורא, ננסה עוד! 🌱", "פעם הבאה תפצחי 🔑"];
  return (good ? goods : bads)[Math.floor(Math.random() * (good ? goods.length : bads.length))];
}

// ====== Render: filters ======
function renderFilters() {
  const wrap = document.getElementById("filters");
  if (["guide", "manage", "sentences", "user", "units", "requests"].includes(state.mode)) { wrap.innerHTML = ""; return; }
  const cats = getCategories();
  wrap.innerHTML = cats.map(c =>
    `<button class="chip ${state.category === c ? "active" : ""}" data-cat="${c}">${getCategoryEmoji(c)} ${c}</button>`
  ).join("");
  wrap.querySelectorAll(".chip").forEach(b => {
    b.onclick = () => {
      state.category = b.dataset.cat;
      resetModeState();
      render();
    };
  });
}

function resetModeState() {
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.quizCurrent = null;
  state.listenCurrent = null;
  state.matchPairs = [];
  state.matchSelected = null;
  state.matchMatched = new Set();
  state.sentenceIdx = 0;
  state.sentenceRevealed = false;
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  state.manageEditingId = null;
  state.manageDraft = null;
}

// ====== Render: flashcards ======
function renderFlash() {
  const list = filtered();
  if (list.length === 0) return "<p style='text-align:center'>אין מילים בקטגוריה הזו</p>";
  if (state.flashOrder.length === 0 || state.flashOrder.length !== list.length) {
    state.flashOrder = shuffle(list.map((_, i) => i));
  }
  const word = list[state.flashOrder[state.flashIdx]];
  const flipped = state.flashFlipped;

  return `
    <div class="flashcard-area">
      <p style="color:#888; font-size:0.95rem;">כרטיסייה ${state.flashIdx + 1} מתוך ${list.length} ${state.category !== "הכול" ? "(" + state.category + ")" : ""}</p>
      <div class="card" id="card">
        <div class="emoji">${word.emoji}</div>
        ${flipped ? `
          <div class="ro" id="ro-word">${word.ro}</div>
          ${word.pron ? `<div class="pron">${word.pron}</div>` : ''}
          ${word.note ? `<div class="note">${word.note}</div>` : ''}
          <div class="hint">👆 לחיצה להפוך חזרה</div>

function newMatch() {
  const list = filtered();
  const n = Math.min(6, list.length);
  const picks = shuffle(list).slice(0, n);
  // Build two columns: left = he, right = ro, shuffled independently
  const left = shuffle(picks.map((w, i) => ({ side: "he", id: i, label: w.emoji + " " + w.he })));
  const right = shuffle(picks.map((w, i) => ({ side: "ro", id: i, label: w.ro })));
  state.matchPairs = { picks, left, right };
  state.matchSelected = null;
  state.matchMatched = new Set();
}
function renderMatch() {
  const list = filtered();
  if (list.length < 4) return "<p style='text-align:center'>צריכים לפחות 4 מילים. בחרי קטגוריה אחרת או 'הכול' 🌈</p>";
  if (!state.matchPairs.picks) newMatch();
  const { left, right, picks } = state.matchPairs;
  const matched = state.matchMatched;
  const allDone = matched.size === picks.length;
  return `
    <p style="text-align:center; color:#555;">לחצי על מילה בעברית ואז על המילה המתאימה ב${targetLangNameHe()} 🧩</p>
    <div class="match-grid" id="matchGrid" style="margin-top:12px;">
      ${left.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "he" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("he-" + item.id) ? "matched" : ""}" data-side="he" data-id="${item.id}">${item.label}</button>
        ${(() => {
          // pair each row: not strictly aligned because right is independent, but visually 2 cols works fine
          return "";
        })()}
      `).join("")}
    </div>
    <div class="match-grid" id="matchGrid2" style="margin-top:10px;">
      ${right.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "ro" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("ro-" + item.id) ? "matched" : ""}" data-side="ro" data-id="${item.id}">${item.label}</button>
      `).join("")}
    </div>
    <div class="feedback" id="fb">${allDone ? "🎉 כל הכבוד! מצאת את כל הזוגות!" : ""}</div>
    ${allDone ? `<div class="nav-row"><button class="btn" id="nextMatch">🔁 סבב חדש</button></div>` : ""}
  `;
}
function attachMatchEvents() {
  const { picks } = state.matchPairs;
  const handler = (btn) => {
    const side = btn.dataset.side;
    const id = parseInt(btn.dataset.id, 10);
    if (state.matchMatched.has(side + "-" + id)) return;
    if (!state.matchSelected) {
      state.matchSelected = { side, id };
      render();
      return;
    }
    if (state.matchSelected.side === side && state.matchSelected.id === id) {
      state.matchSelected = null;
      render();
      return;
    }
    // We have a previous selection — check match
    const a = state.matchSelected;
    const b = { side, id };
    if (a.side !== b.side && a.id === b.id) {
      state.matchMatched.add("he-" + a.id);
      state.matchMatched.add("ro-" + a.id);
      state.matchMatched.add("he-" + b.id);
      state.matchMatched.add("ro-" + b.id);
      state.score += 10;
      state.streak += 1;
      state.seen += 1;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      updateStats();
      speak(picks[a.id].ro);
      state.matchSelected = null;
      const allDone = state.matchMatched.size / 2 === picks.length;
      render();
      if (allDone) confetti();
    } else {
      state.streak = 0;
      updateStats();
      state.matchSelected = null;
      // brief shake feedback
      btn.classList.add("wrong");
      setTimeout(() => { render(); }, 350);
    }
  };
  document.querySelectorAll("#matchGrid .opt, #matchGrid2 .opt").forEach(b => {
    b.onclick = () => handler(b);
  });
  const nx = document.getElementById("nextMatch");
  if (nx) nx.onclick = () => { newMatch(); render(); };
}

// ====== Render: stories ======
// A story has 2-3 sentences. Each word becomes a hover/tap target that
// reveals its Hebrew meaning + niqqud transliteration. The 🔊 button plays
// the whole story; while playing, the current word highlights yellow via
// SpeechSynthesis `boundary` events.

// Tokenize an LTR target-language string into a sequence of tokens with
// absolute char-index offsets. Tokens are either {kind:'word', text, idx}
// or {kind:'sep', text, idx}. Used both for rendering each word as a
// span AND for mapping boundary-event charIndex back to a word index.
function tokenizeStoryLine(text) {
  const re = /(\p{L}+(?:['’]\p{L}+)?)/gu;
  const tokens = [];
  let cursor = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > cursor) {
      tokens.push({ kind: 'sep', text: text.slice(cursor, m.index), idx: cursor });
    }
    tokens.push({ kind: 'word', text: m[1], idx: m.index });
    cursor = m.index + m[1].length;
  }
  if (cursor < text.length) {
    tokens.push({ kind: 'sep', text: text.slice(cursor), idx: cursor });
  }
  return tokens;
}

function normalizeWord(w) {
  return (w || '').toLowerCase().replace(/[.,!?;:'"()’\-]/g, '').trim();
}

// Combine the story's per-sentence words[] arrays (when given) plus
// any sentence-level fallback. Returns a Map from normalized word → entry.
function buildStoryWordIndex(story) {
  const map = new Map();
  for (const s of story.sentences) {
    for (const w of (s.words || [])) {
      const key = normalizeWord(w.ro);
      if (key && !map.has(key)) map.set(key, w);
    }
  }
  for (const w of (story.words || [])) {
    const key = normalizeWord(w.ro);
    if (key && !map.has(key)) map.set(key, w);
  }
  return map;
}

// Concatenate all sentences with a single space between, recording the
// global char offset of each sentence's first char so we can map a
// boundary event's charIndex back to (sentenceIdx, intra-sentence idx).
function buildFullStoryText(story) {
  const parts = [];
  const sentenceOffsets = [];
  let pos = 0;
  story.sentences.forEach((s, i) => {
    if (i > 0) { parts.push(' '); pos += 1; }
    sentenceOffsets.push(pos);
    parts.push(s.ro);
    pos += s.ro.length;
  });
  return { text: parts.join(''), sentenceOffsets };
}

function renderStoryWord(token, wordIdx, wordEntry) {
  const safe = escapeHtml(token.text);
  if (!wordEntry) {
    return `<span class="story-word" data-w="${wordIdx}">${safe}</span>`;
  }
  const tipHe = escapeHtml(wordEntry.he || '');
  const tipPron = wordEntry.pron ? `<span class="tt-pron">${escapeHtml(wordEntry.pron)}</span>` : '';
  return `<span class="story-word" data-w="${wordIdx}" data-ro="${escapeAttr(wordEntry.ro)}">${safe}<span class="story-tooltip">${tipHe}${tipPron}</span></span>`;
}

function renderStories() {
  const list = getStoriesInScope();
  if (list.length === 0) {
    return `<p style="text-align:center; padding:24px 0;">📕 עדיין אין סיפורים ביחידה הזו. גלי יחידות חדשות או החליפי שפה!</p>`;
  }
  if (!state.storyOrder.length || state.storyOrder.length !== list.length) {
    state.storyOrder = list.map((_, i) => i);
    state.storyIdx = 0;
  }
  const story = list[state.storyOrder[state.storyIdx]];
  const wordIndex = buildStoryWordIndex(story);

  // Build the rendered sentences (each as its own block, but words
  // share a global `data-w` index that matches the concatenated text's
  // tokenization — used by the boundary highlighter).
  let globalWordIdx = 0;
  const sentencesHtml = story.sentences.map((s, sIdx) => {
    const tokens = tokenizeStoryLine(s.ro);
    const inner = tokens.map(t => {
      if (t.kind === 'sep') return escapeHtml(t.text);
      const entry = wordIndex.get(normalizeWord(t.text));
      const html = renderStoryWord(t, globalWordIdx, entry);
      globalWordIdx += 1;
      return html;
    }).join('');
    return `<span class="story-sentence"><button class="story-sentence-play" data-s="${sIdx}" title="השמיעי את המשפט הזה">🔊</button>${inner}</span>`;
  }).join('');

  const pronHtml = story.sentences
    .filter(s => s.pron)
    .map(s => `<span class="story-pron-line">${escapeHtml(s.pron)}</span>`)
    .join('');
  const heHtml = story.sentences
    .map(s => `<span class="story-he-line">${escapeHtml(s.he)}</span>`)
    .join('');

  return `
    <div style="text-align:center;">
      <p style="color:#888;">סיפור ${state.storyIdx + 1} מתוך ${list.length} ${story.theme ? '· ' + story.theme : ''}</p>
      <div class="card story-card">
        <div class="emoji">${story.emoji || '📕'}</div>
        <div class="story-title">${escapeHtml(story.titleHe || '')}</div>
        <div class="story-text" id="storyText" dir="ltr">${sentencesHtml}</div>
        ${pronHtml ? `<div class="story-pron">${pronHtml}</div>` : ''}
        <div class="story-he">${heHtml}</div>
      </div>
      <div class="nav-row">
        <button class="btn prev" id="storyPrev">⬅️ הקודם</button>
        <button class="btn speak" id="storyPlay">🔊 השמיעי</button>
        <button class="btn" id="storyNext">הבא ➡️</button>
        <button class="btn shuffle" id="storyShuffle">🔀 ערבבי</button>
      </div>
      <p class="hint" style="margin-top:10px; color:#888; font-size:0.92rem;">
        💡 ${matchMedia('(hover:hover)').matches ? 'ריחפי עם העכבר על מילה כדי לראות את המשמעות' : 'הקישי על מילה כדי לראות את המשמעות'}
      </p>
    </div>
  `;
}

// Map a charIndex in the concatenated story text to a global word index.
// We rebuild the word-position table on demand from the rendered tokens
// rather than reconstructing it twice.
function buildWordPositions(story) {
  const { text, sentenceOffsets } = buildFullStoryText(story);
  const positions = [];
  let globalWordIdx = 0;
  story.sentences.forEach((s, i) => {
    const base = sentenceOffsets[i];
    for (const t of tokenizeStoryLine(s.ro)) {
      if (t.kind === 'word') {
        positions.push({ start: base + t.idx, end: base + t.idx + t.text.length, wordIdx: globalWordIdx });
        globalWordIdx += 1;
      }
    }
  });
  return { fullText: text, positions };
}

function findWordAt(positions, charIndex) {
  for (let i = positions.length - 1; i >= 0; i--) {
    if (positions[i].start <= charIndex) return positions[i];
  }
  return null;
}

function setActiveStoryWord(idx) {
  document.querySelectorAll('.story-word.active').forEach(el => el.classList.remove('active'));
  if (idx == null) return;
  const el = document.querySelector(`.story-word[data-w="${idx}"]`);
  if (el) el.classList.add('active');
}

let storyUtterance = null;

function playStory(story, sentenceIdx) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let fullText, positions;
  if (sentenceIdx != null) {
    // Play just one sentence; build a single-sentence "mini story" so the
    // highlighter still works, then offset positions by the global word
    // index of where this sentence starts in the full story.
    let priorWords = 0;
    for (let i = 0; i < sentenceIdx; i++) {
      priorWords += tokenizeStoryLine(story.sentences[i].ro).filter(t => t.kind === 'word').length;
    }
    const mini = { sentences: [story.sentences[sentenceIdx]] };
    const built = buildWordPositions(mini);
    fullText = built.fullText;
    positions = built.positions.map(p => ({ ...p, wordIdx: p.wordIdx + priorWords }));
  } else {
    const built = buildWordPositions(story);
    fullText = built.fullText;
    positions = built.positions;
  }
  const u = new SpeechSynthesisUtterance(fullText);
  u.lang = ttsLang();
  u.rate = state.speechRate;
  const voices = speechSynthesis.getVoices();
  const prefix = state.language === 'en' ? 'en' : 'ro';
  const match = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
  if (match) u.voice = match;
  u.onboundary = (e) => {
    if (e.name && e.name !== 'word') return;
    const hit = findWordAt(positions, e.charIndex);
    if (hit) setActiveStoryWord(hit.wordIdx);
  };
  u.onend = () => { setActiveStoryWord(null); state.storyPlaying = false; storyUtterance = null; };
  u.onerror = () => { setActiveStoryWord(null); state.storyPlaying = false; storyUtterance = null; };
  storyUtterance = u;
  state.storyPlaying = true;
  speechSynthesis.speak(u);
}

function attachStoryEvents() {
  const list = getStoriesInScope();
  if (!list.length) return;
  const story = list[state.storyOrder[state.storyIdx]];

  document.getElementById('storyPrev').onclick = () => {
    speechSynthesis.cancel();
    state.storyIdx = (state.storyIdx - 1 + list.length) % list.length;
    setActiveStoryWord(null);
    render();
  };
  document.getElementById('storyNext').onclick = () => {
    speechSynthesis.cancel();
    state.storyIdx = (state.storyIdx + 1) % list.length;
    setActiveStoryWord(null);
    render();
  };
  document.getElementById('storyShuffle').onclick = () => {
    speechSynthesis.cancel();
    state.storyOrder = shuffle(list.map((_, i) => i));
    state.storyIdx = 0;
    setActiveStoryWord(null);
    render();
  };
  document.getElementById('storyPlay').onclick = (e) => { e.stopPropagation(); playStory(story); };
  document.querySelectorAll('.story-sentence-play').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const sIdx = parseInt(btn.dataset.s, 10);
      playStory(story, sIdx);
    };
  });

  // Per-word interactions: hover handled by CSS; on touch devices we
  // toggle a `tap-open` class on click. Clicking also speaks the word.
  const isHoverDevice = matchMedia('(hover:hover)').matches;
  document.querySelectorAll('.story-word').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      if (!isHoverDevice) {
        document.querySelectorAll('.story-word.tap-open').forEach(x => { if (x !== el) x.classList.remove('tap-open'); });
        el.classList.toggle('tap-open');
      }
      const ro = el.dataset.ro;
      if (ro) speak(ro);
      else speak(el.textContent.trim());
    };
  });
  if (!isHoverDevice) {
    // Tap outside a word closes the open tooltip.
    document.addEventListener('click', () => {
      document.querySelectorAll('.story-word.tap-open').forEach(x => x.classList.remove('tap-open'));
    }, { once: true });
  }
}

// ====== Render: chat (signed-in only) ======
// LLM bubbles reuse the story-word machinery for hover/tap tooltips
// and TTS word-highlighting.

function renderChatBubble(msg, msgIdx) {
  if (msg.role === 'user') {
    return `<div class="chat-bubble chat-user">${escapeHtml(msg.body || '')}</div>`;
  }
  // Assistant bubble — wrap each word as a story-word, look up tooltips
  // from msg.reply_words (an array of {ro,he,pron}).
  const replyWords = Array.isArray(msg.reply_words) ? msg.reply_words : [];
  const wordIndex = new Map();
  for (const w of replyWords) {
    const key = normalizeWord(w.ro);
    if (key && !wordIndex.has(key)) wordIndex.set(key, w);
  }
  const text = msg.body || '';
  const tokens = tokenizeStoryLine(text);
  let wIdx = 0;
  const inner = tokens.map(t => {
    if (t.kind === 'sep') return escapeHtml(t.text);
    const entry = wordIndex.get(normalizeWord(t.text));
    // Use a chat-scoped wordIdx prefix so highlighting can find the right span.
    const safe = escapeHtml(t.text);
    const dataW = `chat-${msgIdx}-${wIdx}`;
    wIdx += 1;
    if (!entry) {
      return `<span class="story-word" data-w="${dataW}">${safe}</span>`;
    }
    const tipHe = escapeHtml(entry.he || '');
    const tipPron = entry.pron ? `<span class="tt-pron">${escapeHtml(entry.pron)}</span>` : '';
    return `<span class="story-word" data-w="${dataW}" data-ro="${escapeAttr(entry.ro)}">${safe}<span class="story-tooltip">${tipHe}${tipPron}</span></span>`;
  }).join('');
  const heToggle = msg.reply_he
    ? `<button class="chat-tx" data-action="toggle-he" data-i="${msgIdx}" title="הצגי בעברית">🇮🇱</button>`
    : '';
  const heBlock = (msg._heVisible && msg.reply_he)
    ? `<div class="chat-bubble-he">${escapeHtml(msg.reply_he)}</div>`
    : '';
  return `
    <div class="chat-bubble chat-llm" data-i="${msgIdx}" dir="ltr">
      <div class="chat-bubble-actions">
        <button class="chat-tx" data-action="play" data-i="${msgIdx}" title="השמיעי">🔊</button>
        ${heToggle}
      </div>
      <div class="chat-bubble-text">${inner}</div>
      ${heBlock}
    </div>
  `;
}

function renderChat() {
  if (!auth.session || !auth.currentProfile) {
    return `<p style="text-align:center; padding:24px;">💬 השיחה זמינה רק לפרופיל מחובר. ${auth.session ? 'בחרי פרופיל בפס העליון.' : 'התחברי כדי לדבר עם הבוט.'}</p>`;
  }
  if (!state.chatLoaded) {
    // Kick off a fetch but return a placeholder immediately.
    fetchChatHistory();
    return `<p style="text-align:center; padding:24px;">⏳ טוענת היסטוריית שיחה...</p>`;
  }
  const messagesHtml = state.chatMessages
    .map((m, i) => renderChatBubble(m, i))
    .join('');
  const errHtml = state.chatError
    ? `<div class="chat-error">⚠️ ${escapeHtml(state.chatError)}</div>`
    : '';
  const pendingHtml = state.chatPending
    ? `<div class="chat-bubble chat-llm chat-pending"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`
    : '';
  const placeholder = state.language === 'en'
    ? 'Type in English…'
    : 'Scrie în română…';
  const hasMessages = state.chatMessages.length > 0;
  return `
    <div class="chat-wrap">
      <div class="chat-toolbar">
        <button class="chat-reset" id="chatReset" ${state.chatPending || !hasMessages ? 'disabled' : ''} title="נקי את כל השיחה ותתחילי מחדש">🗑️ שיחה חדשה</button>
      </div>
      <div class="chat-list" id="chatList">
        ${hasMessages ? messagesHtml : `<p class="hint" style="text-align:center; color:#888; padding:16px;">💬 כתבי ב${targetLangNameHe()} כדי להתחיל לדבר!</p>`}
        ${pendingHtml}
      </div>
      ${errHtml}
      <form class="chat-composer" id="chatForm" autocomplete="off">
        <input type="text" id="chatInput" placeholder="${placeholder}" dir="ltr" lang="${state.language === 'en' ? 'en' : 'ro'}" ${state.chatPending ? 'disabled' : ''} maxlength="500">
        <button type="submit" id="chatSend" class="btn speak" ${state.chatPending ? 'disabled' : ''}>שלחי ➤</button>
      </form>
      <p class="hint" style="margin-top:8px; color:#888; font-size:0.9rem; text-align:center;">
        💡 ${matchMedia('(hover:hover)').matches ? 'ריחפי על מילה כדי לראות תרגום' : 'הקישי על מילה כדי לראות תרגום'} · 🔊 משמיעה את התשובה · 🇮🇱 מציגה תרגום
      </p>
    </div>
  `;
}

async function fetchChatHistory() {
  if (state.chatLoaded) return;
  state.chatLoaded = true; // prevent re-entry while in flight
  try {
    const { data, error } = await auth.client
      .from('chat_messages')
      .select('id, role, body, reply_words, reply_he, created_at')
      .eq('profile_id', auth.currentProfile.id)
      .eq('language', state.language)
      .order('created_at', { ascending: true })
      .limit(60);
    if (error) throw error;
    state.chatMessages = (data || []).map(m => ({ ...m, _heVisible: false }));
  } catch (e) {
    state.chatError = 'לא הצלחתי לטעון היסטוריה: ' + (e.message || e);
    state.chatMessages = [];
  }
  if (state.mode === 'chat') {
    render();
    // First-time-empty: kick off an opener so the LLM speaks first.
    if (state.chatMessages.length === 0 && !state.chatPending && !state.chatError) {
      requestOpener();
    }
  }
}

async function requestOpener() {
  if (!auth.session || !auth.currentProfile) return;
  if (state.chatPending) return;
  state.chatError = null;
  state.chatPending = true;
  render();
  try {
    const token = auth.session.access_token;
    const vocabSnapshot = getVocab().filter(inUnitScope)
      .slice(0, 200)
      .map(v => ({ ro: v.ro, he: v.he }));
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({
        profile_id: auth.currentProfile.id,
        profile_name: auth.currentProfile.name || '',
        language: state.language,
        opener: true,
        vocab_snapshot: vocabSnapshot,
        recent_messages: [],
      }),
    });
    if (r.status >= 400) {
      const err = await r.json().catch(() => ({}));
      const detail = err.detail ? ' — ' + (typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail)) : '';
      state.chatError = 'תקלה בפתיחה: ' + (err.error || ('שגיאה ' + r.status)) + detail;
      console.warn('opener error', r.status, err);
    } else {
      const data = await r.json();
      state.chatMessages.push({
        role: 'assistant',
        body: data.reply_text || '',
        reply_words: data.reply_words || [],
        reply_he: data.reply_he || '',
        _heVisible: false,
        created_at: new Date().toISOString(),
      });
    }
  } catch (e) {
    state.chatError = 'בעיית רשת בפתיחה: ' + (e.message || e);
  } finally {
    state.chatPending = false;
    if (state.mode === 'chat') {
      render();
      scrollChatToBottom();
    }
  }
}

function scrollChatToBottom() {
  const el = document.getElementById('chatList');
  if (el) el.scrollTop = el.scrollHeight;
}

async function sendChatMessage(text) {
  if (!text || !text.trim()) return;
  if (state.chatPending) return;
  if (!auth.session || !auth.currentProfile) return;
  state.chatError = null;
  state.chatPending = true;

  // Optimistic: append the user's message right away.
  const userMsg = {
    role: 'user', body: text.trim(),
    created_at: new Date().toISOString(),
  };
  state.chatMessages.push(userMsg);
  render();
  scrollChatToBottom();

  try {
    const token = auth.session.access_token;
    const vocabSnapshot = getVocab().filter(inUnitScope)
      .slice(0, 200)
      .map(v => ({ ro: v.ro, he: v.he }));
    const recentMessages = state.chatMessages.slice(-11, -1).map(m => ({ role: m.role, body: m.body }));
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({
        profile_id: auth.currentProfile.id,
        profile_name: auth.currentProfile.name || '',
        language: state.language,
        message_text: userMsg.body,
        vocab_snapshot: vocabSnapshot,
        recent_messages: recentMessages,
      }),
    });
    if (r.status === 429) {
      state.chatError = 'הגעת למכסה היומית. נסי שוב מחר 🌙';
    } else if (r.status === 401) {
      state.chatError = 'אנא התחברי מחדש.';
    } else if (r.status >= 400) {
      const err = await r.json().catch(() => ({}));
      const detail = err.detail ? ' — ' + (typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail)) : '';
      state.chatError = 'תקלה: ' + (err.error || ('שגיאה ' + r.status)) + detail;
      console.warn('chat error', r.status, err);
    } else {
      const data = await r.json();
      state.chatMessages.push({
        role: 'assistant',
        body: data.reply_text || '',
        reply_words: data.reply_words || [],
        reply_he: data.reply_he || '',
        _heVisible: false,
        created_at: new Date().toISOString(),
      });
    }
  } catch (e) {
    state.chatError = 'בעיית רשת: ' + (e.message || e);
  } finally {
    state.chatPending = false;
    render();
    scrollChatToBottom();
  }
}

async function resetChat() {
  if (state.chatPending) return;
  if (!auth.session || !auth.currentProfile) return;
  const ok = window.confirm('למחוק את כל השיחה ולהתחיל מחדש?');
  if (!ok) return;
  state.chatError = null;
  state.chatPending = true;
  render();
  try {
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    const { error } = await auth.client
      .from('chat_messages')
      .delete()
      .eq('profile_id', auth.currentProfile.id)
      .eq('language', state.language);
    if (error) throw error;
    state.chatMessages = [];
  } catch (e) {
    state.chatError = 'לא הצלחתי לאפס: ' + (e.message || e);
  } finally {
    state.chatPending = false;
    render();
  }
  // After a successful reset, immediately request a new opener so the
  // empty state never sits there blankly.
  if (!state.chatError) requestOpener();
}

function attachChatEvents() {
  const form = document.getElementById('chatForm');
  if (form) {
    form.onsubmit = (e) => {
      e.preventDefault();
      const input = document.getElementById('chatInput');
      const text = input ? input.value : '';
      if (input) input.value = '';
      sendChatMessage(text);
    };
  }
  const resetBtn = document.getElementById('chatReset');
  if (resetBtn) resetBtn.onclick = resetChat;
  // Per-word interactions (same model as Stories).
  const isHoverDevice = matchMedia('(hover:hover)').matches;
  document.querySelectorAll('.chat-llm .story-word').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      if (!isHoverDevice) {
        document.querySelectorAll('.story-word.tap-open').forEach(x => { if (x !== el) x.classList.remove('tap-open'); });
        el.classList.toggle('tap-open');
      }
      const ro = el.dataset.ro;
      if (ro) speak(ro);
      else speak(el.textContent.trim());
    };
  });
  // Bubble actions: play / Hebrew toggle.
  document.querySelectorAll('.chat-llm .chat-tx').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.i, 10);
      const action = btn.dataset.action;
      const msg = state.chatMessages[idx];
      if (!msg) return;
      if (action === 'play') {
        playChatBubble(msg, idx);
      } else if (action === 'toggle-he') {
        msg._heVisible = !msg._heVisible;
        render();
        scrollChatToBottom();
      }
    };
  });
  scrollChatToBottom();
}

function playChatBubble(msg, msgIdx) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const text = msg.body || '';
  // Build positions for the chat bubble's word spans. Tokenize the same
  // way the renderer did so wordIdx prefixes match data-w attributes.
  const tokens = tokenizeStoryLine(text);
  const positions = [];
  let wIdx = 0;
  for (const t of tokens) {
    if (t.kind === 'word') {
      positions.push({ start: t.idx, end: t.idx + t.text.length, wordIdx: `chat-${msgIdx}-${wIdx}` });
      wIdx += 1;
    }
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = ttsLang();
  u.rate = state.speechRate;
  const voices = speechSynthesis.getVoices();
  const prefix = state.language === 'en' ? 'en' : 'ro';
  const match = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
  if (match) u.voice = match;
  u.onboundary = (e) => {
    if (e.name && e.name !== 'word') return;
    // Find the position whose range contains charIndex
    let hit = null;
    for (let i = positions.length - 1; i >= 0; i--) {
      if (positions[i].start <= e.charIndex) { hit = positions[i]; break; }
    }
    document.querySelectorAll('.story-word.active').forEach(el => el.classList.remove('active'));
    if (hit) {
      const el = document.querySelector(`.story-word[data-w="${hit.wordIdx}"]`);
      if (el) el.classList.add('active');
    }
  };
  u.onend = () => { document.querySelectorAll('.story-word.active').forEach(el => el.classList.remove('active')); };
  u.onerror = () => { document.querySelectorAll('.story-word.active').forEach(el => el.classList.remove('active')); };
  speechSynthesis.speak(u);
}

function escapeAttr(s) { return String(s == null ? "" : s).replace(/"/g, "&quot;").replace(/</g, "&lt;"); }
function escapeHtml(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function attachManageEvents() {
  document.querySelectorAll(".m-tab").forEach(b => {
    b.onclick = () => {
      state.manageTab = b.dataset.mtab;
      state.manageEditingId = null;
      state.manageDraft = null;
      render();
    };
  });

  // Collect inputs into a draft so render() doesn't lose typed-but-unsaved values when re-rendered
  const collect = () => {
    const get = id => (document.getElementById(id) || {}).value || "";
    if (state.manageTab === "words") {
      return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
               pron: get("f-pron").trim(), cat: get("f-cat").trim() || "שונות",
               emoji: get("f-emoji").trim() || "✨", note: get("f-note").trim() };
    }
    const wordsRaw = get("f-words");
    const words = wordsRaw.split("\n").map(line => {
      const parts = line.split("|").map(s => s.trim());
      if (parts.length < 2 || !parts[0] || !parts[1]) return null;
      return { ro: parts[0], he: parts[1], pron: parts[2] || "" };
    }).filter(Boolean);
    return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
             pron: get("f-pron").trim(), theme: get("f-theme").trim(),
             emoji: get("f-emoji").trim() || "💬", words };
  };

  const save = () => {
    const d = collect();
    if (!d.he || !d.ro) { alert("חובה למלא עברית ו" + targetLangNameHe()); return; }
    const list = state.manageTab === "words" ? userVocab : userSentences;
    if (state.manageEditingId) {
      const i = list.findIndex(x => x.id === state.manageEditingId);
      if (i >= 0) list[i] = { ...list[i], ...d, id: state.manageEditingId };
    } else {
      d.id = "u" + Date.now() + Math.floor(Math.random() * 1000);
      list.push(d);
    }
    if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
    state.manageEditingId = null;
    state.manageDraft = null;
    // invalidate orders since vocab/sentence count changed
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
    render();
  };

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) saveBtn.onclick = save;
  const cancelBtn = document.getElementById("cancelBtn");
  if (cancelBtn) cancelBtn.onclick = () => {
    state.manageEditingId = null; state.manageDraft = null; render();
  };
  const testBtn = document.getElementById("testSpeak");
  if (testBtn) testBtn.onclick = () => {
    const ro = (document.getElementById("f-ro") || {}).value || "";
    if (ro) speak(ro);
  };

  // Row actions
  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const list = state.manageTab === "words" ? userVocab : userSentences;
      const item = list.find(x => x.id === id);
      if (!item) return;
      if (action === "speak") speak(item.ro);
      else if (action === "edit") {
        state.manageEditingId = id;
        state.manageDraft = { ...item };
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (action === "delete") {
        if (!confirm("למחוק את \"" + item.he + "\"?")) return;
        const i = list.findIndex(x => x.id === id);
        if (i >= 0) list.splice(i, 1);
        if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
        state.flashOrder = shuffle(filtered().map((_, i) => i));
        state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
        render();
      }
    };
  });

  // Built-in speak
  document.querySelectorAll("[data-builtin-speak]").forEach(b => {
    b.onclick = () => speak(b.dataset.builtinSpeak);
  });

  // Export / import / reset
  const exportBtn = document.getElementById("exportBtn");
  if (exportBtn) exportBtn.onclick = () => {
    const data = { exportedAt: new Date().toISOString(), userVocab, userSentences, stats: { score: state.score, bestStreak: state.bestStreak, seen: state.seen } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "romanian-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };
  const importBtn = document.getElementById("importBtn");
  if (importBtn) importBtn.onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };
  const resetBtn = document.getElementById("resetBtn");
  if (resetBtn) resetBtn.onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };
}

function newId() { return "u" + Date.now() + Math.floor(Math.random() * 1000000); }

// Parses a markdown table in the format the user paste:
// | קטגוריה | עברית | רומנית | הגייה | הערות |
// Category cells are sticky — empty category inherits previous.
function parseMarkdownTable(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  let currentCat = "";
  const words = [];
  for (const line of lines) {
    if (!line.startsWith("|")) continue;
    if (/^\|[\s:|\-]+$/.test(line)) continue; // separator like |---|---|
    let cells = line.split("|").map(c => c.trim().replace(/\*\*/g, "").replace(/__/g, ""));
    if (cells.length && cells[0] === "") cells.shift();
    if (cells.length && cells[cells.length - 1] === "") cells.pop();
    if (cells.length < 3) continue;
    const [cat, he, ro, pron, note] = cells;
    // Skip header rows
    if (/^רומנית|^אנגלית|^Romanian|^English/i.test(ro) || he === "עברית" || he === "Hebrew") continue;
    if (cat) currentCat = cat;
    if (!he || !ro) continue;
    words.push({
      id: newId() + "-" + words.length,
      he, ro,
      pron: pron || "",
      cat: currentCat || "מילון מורחב",
      emoji: "✨",
      note: note || "",
    });
  }
  return { words, sentences: [] };
}

// Parses JSON in several shapes:
//   - Existing export: { userVocab, userSentences }
//   - { words, sentences }
//   - Plain array → treated as words
function parseJsonDictionary(text) {
  const data = JSON.parse(text);
  let words = [], sentences = [];
  if (Array.isArray(data)) {
    words = data;
  } else if (data.userVocab !== undefined || data.userSentences !== undefined) {
    words = data.userVocab || [];
    sentences = data.userSentences || [];
  } else if (data.words !== undefined || data.sentences !== undefined) {
    words = data.words || [];
    sentences = data.sentences || [];
  } else {
    throw new Error("פורמט לא מזוהה");
  }
  words = (words || []).filter(w => w && w.he && w.ro).map(w => ({
    id: w.id || newId(),
    he: w.he, ro: w.ro,
    pron: w.pron || "",
    cat: w.cat || "מילון מורחב",
    emoji: w.emoji || "✨",
    note: w.note || "",
  }));
  sentences = (sentences || []).filter(s => s && s.he && s.ro).map(s => ({
    id: s.id || newId(),
    he: s.he, ro: s.ro,
    pron: s.pron || "",
    emoji: s.emoji || "💬",
    theme: s.theme || "",
    words: Array.isArray(s.words) ? s.words : [],
  }));
  return { words, sentences };
}

function parseExtension(text) {
  const trimmed = text.trim();
  if (!trimmed) throw new Error("הטקסט ריק");
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    return { type: "json", ...parseJsonDictionary(trimmed) };
  }
  if (trimmed.includes("|")) {
    return { type: "markdown", ...parseMarkdownTable(trimmed) };
  }
  throw new Error("לא זוהה פורמט. צריך JSON או טבלת Markdown");
}

    const err = document.getElementById("pin-error");
    const submit = () => {
      if ((inp.value || "").trim() === getAdminPin()) {
        state.adminUnlocked = true;
        render();
      } else {
        err.textContent = "❌ קוד שגוי";
        inp.value = "";
        inp.focus();
      }
    };
    unlockBtn.onclick = submit;
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    setTimeout(() => inp.focus(), 50);
  }

  const lockBtn = document.getElementById("pinLockBtn");
  if (lockBtn) lockBtn.onclick = () => { state.adminUnlocked = false; render(); };

  const changeBtn = document.getElementById("pinChangeBtn");
  if (changeBtn) changeBtn.onclick = () => {
    const cur = prompt("קוד נוכחי:");
    if (cur === null) return;
    if (cur !== getAdminPin()) { alert("קוד שגוי"); return; }
    const nw = prompt("קוד חדש (4 ספרות):");
    if (nw === null) return;
    if (!/^\d{4}$/.test(nw)) { alert("הקוד חייב להיות 4 ספרות"); return; }
    setAdminPin(nw);
    alert("הקוד עודכן ✨");
  };

  // If admin is locked, no further handlers to attach
  if (!state.adminUnlocked) return;

  const ta = document.getElementById("extInput");

  document.getElementById("extSample").onclick = () => { ta.value = getSampleMarkdown(); };
  document.getElementById("extClear").onclick  = () => { ta.value = ""; state.userPreview = null; render(); };

  document.getElementById("extFile").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json,.md,.txt,application/json,text/markdown,text/plain";
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        ta.value = r.result;
        tryParse();
      };
      r.readAsText(file);
    };
    inp.click();
  };

  const tryParse = () => {
    try {
      const result = parseExtension(ta.value);
      if (result.words.length === 0 && result.sentences.length === 0) {
        alert("לא נמצאו מילים או משפטים בטקסט.");
        return;
      }
      state.userPreview = result;
      render();
    } catch (e) {
      alert("שגיאה בקריאת הטקסט: " + e.message);
    }
  };
  document.getElementById("extParse").onclick = tryParse;

  const commitBtn = document.getElementById("extCommit");
  if (commitBtn) commitBtn.onclick = () => {
    const { words, sentences } = state.userPreview;
    userVocab = userVocab.concat(words);
    userSentences = userSentences.concat(sentences);
    saveUserVocab(); saveUserSentences();
    state.userPreview = null;
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
    alert(`נוספו ${words.length} מילים ו-${sentences.length} משפטים 🎉`);
    render();
  };
  const cancelBtn = document.getElementById("extCancel");
  if (cancelBtn) cancelBtn.onclick = () => { state.userPreview = null; render(); };

  document.getElementById("uExport").onclick = () => {
    const data = {
      exportedAt: new Date().toISOString(),
      userVocab, userSentences,
      stats: { score: state.score, bestStreak: state.bestStreak, seen: state.seen },
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "romanian-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  document.getElementById("uImport").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = (e) => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };

  document.getElementById("uResetVocab").onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };

  document.getElementById("uResetProgress").onclick = () => {
    if (!confirm("לאפס נקודות, רצף שיא ומונה תרגולים?")) return;
    state.score = 0; state.bestStreak = 0; state.streak = 0; state.seen = 0;
    state.maxUnlockedUnit = 1; state.currentUnit = 1;
    try { localStorage.setItem("ro-kids-stats", JSON.stringify({})); } catch (e) {}
    render();
  };
}

// ====== Render: curriculum unit picker ======
function renderUnits() {
  const tiles = UNITS.map(u => {
    const unlocked = u.n <= state.maxUnlockedUnit;
    const current = u.n === state.currentUnit;
    const hint = unlocked
      ? (current ? '✓ נוכחית' : 'זמינה')
      : `נעולה · ${u.threshold - state.score} נקודות עד הפתיחה`;
    const vocabInUnit = getVocab().filter(w => w.unit === u.n).length;
    const sentencesInUnit = getSentences().filter(s => s.unit === u.n).length;
    return `
      <button class="unit-tile ${unlocked ? 'unlocked' : 'locked'} ${current ? 'current' : ''}" data-unit="${u.n}" ${unlocked ? '' : 'disabled'}>
        <div class="unit-num">${unlocked ? u.emoji : '🔒'} יחידה ${u.n}</div>
        <div class="unit-name">${escapeHtml(u.name)}</div>
        <div class="unit-meta">${vocabInUnit} מילים · ${sentencesInUnit} משפטים</div>
        <div class="unit-hint">${hint}</div>
      </button>`;
  }).join('');
  return `
    <h2 style="text-align:center; color:#d81b60; margin-bottom:6px;">📚 יחידות לימוד</h2>
    <p class="hint" style="text-align:center; margin-bottom:14px;">
      התרגול ביחידה N כולל את כל המילים והמשפטים מהמילון הבסיסי, הוספות שלך, ויחידות 1 עד N.
    </p>
    <div class="units-grid">${tiles}</div>
  `;
}

function attachUnitsEvents() {
  document.querySelectorAll('.unit-tile[data-unit]').forEach(b => {
    b.onclick = () => {
      const n = parseInt(b.dataset.unit, 10);
      if (n > state.maxUnlockedUnit) return;
      state.currentUnit = n;
      // reset shuffle orders so the new pool reflects
      state.flashOrder = shuffle(filtered().map((_, i) => i));
      state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
      state.storyOrder = [];
      state.flashIdx = 0; state.sentenceIdx = 0; state.storyIdx = 0; state.flashFlipped = false; state.sentenceRevealed = false;
      // jump back to last-used practice mode (flash by default)
      state.mode = 'flash';
      document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
      const flashBtn = document.querySelector('.modes button[data-mode="flash"]');
      if (flashBtn) flashBtn.classList.add('active');
      render();
    };
  });
}

// ====== Unit unlocking ======
function maybeUnlockNextUnit() {
  const calculatedMax = maxUnitForScore(state.score);
  if (calculatedMax > state.maxUnlockedUnit) {
    state.maxUnlockedUnit = calculatedMax;
    state.currentUnit = calculatedMax;  // auto-advance to the new unit
    showUnitUnlock(calculatedMax);
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  }
}

function showUnitUnlock(n) {
  const u = unitOf(n);
  const t = document.createElement('div');
  t.className = 'unit-unlock-toast';
  t.innerHTML = `🎉 יחידה ${n} נפתחה!<br><b>${u.emoji} ${escapeHtml(u.name)}</b>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ====== Master render ======
function render() {
  renderFilters();
  const content = document.getElementById("content");
  let html = "";
  if      (state.mode === "flash")     html = renderFlash();
  else if (state.mode === "quiz")      html = renderQuiz();
  else if (state.mode === "listen")    html = renderListen();
  else if (state.mode === "match")     html = renderMatch();
  else if (state.mode === "sentences") html = renderSentences();
  else if (state.mode === "stories")   html = renderStories();
  else if (state.mode === "chat")      html = renderChat();
  else if (state.mode === "units")     html = renderUnits();
  else if (state.mode === "guide")     html = renderGuide();
  else if (state.mode === "manage")    html = renderManage();
  else if (state.mode === "user")      html = renderUser();
  else if (state.mode === "requests")  html = renderRequests();
  content.innerHTML = html;
  if      (state.mode === "flash")     attachFlashEvents();
  else if (state.mode === "quiz")      attachQuizEvents();
  else if (state.mode === "listen")    attachListenEvents();
  else if (state.mode === "match")     attachMatchEvents();
  else if (state.mode === "sentences") attachSentenceEvents();
  else if (state.mode === "stories")   attachStoryEvents();
  else if (state.mode === "chat")      attachChatEvents();
  else if (state.mode === "units")     attachUnitsEvents();
  else if (state.mode === "guide")     attachGuideEvents();
  else if (state.mode === "manage")    attachManageEvents();
  else if (state.mode === "user")      attachUserEvents();
  else if (state.mode === "requests")  attachRequestsEvents();
  updateStats();
}

// ====== Auth controller ======
// All Supabase-backed state lives here. When `auth.session` is set AND a profile
// is selected, the app is in "authed mode" — reads/writes target Supabase.
// Otherwise it's "guest mode" — localStorage as before.
const auth = {
  client: null, session: null, family: null,
  profiles: [], currentProfile: null,
  isAdmin: false,
  view: 'guest',                  // 'guest' | 'signing_in' | 'check_email' | 'picker' | 'pin' | 'app'
  signinMode: 'signin',           // 'signin' | 'signup'
  pendingPinProfile: null,
  realtimeChannel: null,
  unreadRequests: 0,
};
function isAuthed() { return !!(auth.session && auth.family && auth.currentProfile); }
function looksLikeUuid(s) {
  return typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
}

async function initAuth() {
  if (window._supabase) {
    auth.client = window._supabase;
    const { data } = await auth.client.auth.getSession();
    if (data && data.session) await handleSignedIn(data.session);
    auth.client.auth.onAuthStateChange(async (event, sess) => {
      if (event === 'SIGNED_OUT') await clearLocalSession();
      else if (event === 'SIGNED_IN' && sess && !auth.session) await handleSignedIn(sess);
    });
  }
  renderAuthBar();
  renderAuthOverlay();
  applyModeVisibility();
  attachContactLink();
}

async function clearLocalSession() {
  auth.session = null; auth.family = null; auth.profiles = [];
  auth.currentProfile = null; auth.isAdmin = false; auth.view = 'guest';
  if (auth.realtimeChannel) {
    try { await auth.client.removeChannel(auth.realtimeChannel); } catch (e) {}
    auth.realtimeChannel = null;
  }
  auth.unreadRequests = 0;
  loadGuestVocab(); loadGuestSentences(); loadGuestStats();
  state.streak = 0;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  renderAuthBar(); renderAuthOverlay(); applyModeVisibility(); render();
}

function loadGuestVocab() {
  try { userVocab = JSON.parse(localStorage.getItem(USER_VOCAB_KEY) || "[]"); } catch (e) { userVocab = []; }
}
function loadGuestSentences() {
  try { userSentences = JSON.parse(localStorage.getItem(SENTENCES_KEY) || "[]"); } catch (e) { userSentences = []; }
}
function loadGuestStats() {
  // Apply last-used language from localStorage if present
  try {
    const lang = localStorage.getItem('ro-kids-language');
    if (lang === 'ro' || lang === 'en') state.language = lang;
  } catch (e) {}
  try {
    const saved = JSON.parse(localStorage.getItem("ro-kids-stats-" + state.language) || "{}");
    state.score = saved.score || 0;
    state.bestStreak = saved.bestStreak || 0;
    state.seen = saved.seen || 0;
    state.maxUnlockedUnit = saved.maxUnlockedUnit || 1;
    state.currentUnit = state.maxUnlockedUnit;
  } catch (e) {}
}

async function handleSignedIn(session) {
  auth.session = session;
  auth.isAdmin = (session.user && session.user.user_metadata && session.user.user_metadata.role === 'admin');
  await ensureFamily();
  await loadProfiles();
  applyModeVisibility();
  // Auto-resume last profile if no PIN
  let lastId = null;
  try { lastId = localStorage.getItem('ro-kids-last-profile'); } catch (e) {}
  const last = auth.profiles.find(p => p.id === lastId);
  if (last && !last.pin) {
    await selectProfile(last);
  } else {
    auth.view = 'picker';
  }
  if (auth.isAdmin) subscribeAdminRealtime();
  renderAuthBar(); renderAuthOverlay();
}

async function ensureFamily() {
  const { data: fams } = await auth.client.from('families')
    .select('*').eq('owner_user_id', auth.session.user.id).limit(1);
  if (fams && fams.length) { auth.family = fams[0]; return; }
  const defaultName = (auth.session.user.email || 'family').split('@')[0];
  const { data: created, error } = await auth.client.from('families')
    .insert({ owner_user_id: auth.session.user.id, name: defaultName })
    .select().single();
  if (error) { console.error('create family', error); return; }
  auth.family = created;
}

async function loadProfiles() {
  if (!auth.family) return;
  const { data } = await auth.client.from('profiles')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  auth.profiles = data || [];
}

async function selectProfile(profile) {
  auth.currentProfile = profile;
  auth.view = 'app';
  try { localStorage.setItem('ro-kids-last-profile', profile.id); } catch (e) {}
  // Chat is per-profile; clear so the next chat-mode entry re-fetches.
  state.chatMessages = [];
  state.chatLoaded = false;
  state.chatError = null;
  await loadFamilyData();
  renderAuthBar(); renderAuthOverlay(); applyModeVisibility(); render();
}

async function loadFamilyData() {
  if (!auth.family || !auth.currentProfile) return;
  const { data: vocab } = await auth.client.from('vocab')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  userVocab = (vocab || []).map(v => ({ ...v, note: v.note || '' }));
  const { data: sentences } = await auth.client.from('sentences')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  userSentences = (sentences || []).map(s => ({ ...s, words: Array.isArray(s.words) ? s.words : [] }));
  const { data: prog } = await auth.client.from('progress')
    .select('*').eq('profile_id', auth.currentProfile.id).eq('language', state.language).maybeSingle();
  if (prog) {
    state.score = prog.score || 0;
    state.bestStreak = prog.best_streak || 0;
    state.seen = prog.seen || 0;
    state.maxUnlockedUnit = prog.max_unlocked_unit || maxUnitForScore(state.score);
  } else {
    state.score = 0; state.bestStreak = 0; state.seen = 0;
    state.maxUnlockedUnit = 1;
    try { await auth.client.from('progress').insert({ profile_id: auth.currentProfile.id, language: state.language, max_unlocked_unit: 1 }); } catch (e) {}
  }
  state.currentUnit = state.maxUnlockedUnit;
  state.streak = 0;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
}

async function signInWithPassword(email, password) {
  if (!auth.client) { alert('Supabase לא מוגדר — ראה SETUP.md'); return { error: { message: 'no client' } }; }
  return auth.client.auth.signInWithPassword({ email, password });

async function signUpWithPassword(email, password) {

  return auth.client.auth.signUp({

    options: { emailRedirectTo: window.location.href },

async function signInMagicLink(email) {

async function signOut() {

}

// --- Data sync to Supabase (called after every local mutation when authed) ---
async function syncVocabFull() {
  if (!isAuthed()) return;
  // Delete server rows whose ids are not in our local set (uuid-only)
  const keepIds = userVocab.filter(w => looksLikeUuid(w.id)).map(w => w.id);
  let delQ = auth.client.from('vocab').delete().eq('family_id', auth.family.id);
  if (keepIds.length) delQ = delQ.not('id', 'in', '(' + keepIds.map(id => '"' + id + '"').join(',') + ')');
  try { await delQ; } catch (e) {}
  // Upsert each local row; assign UUID for new ones
  for (let i = 0; i < userVocab.length; i++) {
    const w = userVocab[i];
    const payload = {
      family_id: auth.family.id,
      he: w.he, ro: w.ro,
      pron: w.pron || null, cat: w.cat || null,
      emoji: w.emoji || '✨', note: w.note || null,
      added_by_profile_id: auth.currentProfile?.id || null,
    };
    if (looksLikeUuid(w.id)) payload.id = w.id;
    const { data } = await auth.client.from('vocab').upsert(payload).select().single();
    if (data) userVocab[i] = { ...userVocab[i], ...data };
  }
}

async function syncSentencesFull() {
  if (!isAuthed()) return;
  const keepIds = userSentences.filter(s => looksLikeUuid(s.id)).map(s => s.id);
  let delQ = auth.client.from('sentences').delete().eq('family_id', auth.family.id);
  if (keepIds.length) delQ = delQ.not('id', 'in', '(' + keepIds.map(id => '"' + id + '"').join(',') + ')');
  try { await delQ; } catch (e) {}
  for (let i = 0; i < userSentences.length; i++) {
    const s = userSentences[i];
    const payload = {
      family_id: auth.family.id,
      he: s.he, ro: s.ro,
      pron: s.pron || null, emoji: s.emoji || '💬',
      theme: s.theme || null,
      words: s.words || [],
      added_by_profile_id: auth.currentProfile?.id || null,
    };
    if (looksLikeUuid(s.id)) payload.id = s.id;
    const { data } = await auth.client.from('sentences').upsert(payload).select().single();
    if (data) userSentences[i] = { ...userSentences[i], ...data };
  }
}

let _progressTimer = null;
function saveProgressDebounced() {
  if (!isAuthed()) return;
  clearTimeout(_progressTimer);
  _progressTimer = setTimeout(async () => {
    try {
      await auth.client.from('progress').upsert({
        profile_id: auth.currentProfile.id,
        language: state.language,

        updated_at: new Date().toISOString(),

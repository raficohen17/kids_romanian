<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רומנית עם חיוך 🇷🇴</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Heebo", "Arial Hebrew", Arial, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 50%, #fff9c4 100%);
    color: #333;
    direction: rtl;
  }
  body { padding: 16px; padding-bottom: 80px; }

  header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 { font-size: 2.2rem; color: #d81b60; }
  h1 .flag { font-size: 1.8rem; }
  .subtitle { color: #555; margin-top: 4px; font-size: 1.05rem; }

  .panel {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    max-width: 720px;
    margin: 0 auto 16px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat {
    background: linear-gradient(135deg, #f8bbd0, #ce93d8);
    border-radius: 16px;
    padding: 10px 16px;
    text-align: center;
    color: white;
    font-weight: bold;
    min-width: 100px;
  }
  .stat .num { font-size: 1.6rem; display: block; }
  .stat .lbl { font-size: 0.85rem; opacity: 0.95; }
  .stat.streak { background: linear-gradient(135deg, #ff7043, #ffa726); }
  .stat.score  { background: linear-gradient(135deg, #66bb6a, #26c6da); }
  .stat.total  { background: linear-gradient(135deg, #5c6bc0, #42a5f5); }

  /* mode tabs */
  .modes {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .modes button {
    background: white;
    border: 3px solid #e0e0e0;
    border-radius: 18px;
    padding: 10px 18px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .modes button:hover { border-color: #ba68c8; transform: translateY(-2px); }
  .modes button.active {
    background: linear-gradient(135deg, #ba68c8, #7e57c2);
    color: white;
    border-color: transparent;
  }

  /* category filter */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }
  .chip {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
  }
  .chip.active {
    background: #fff59d;
    border-color: #fbc02d;
    font-weight: bold;
  }

  /* flashcard */
  .flashcard-area { text-align: center; }
  .card {
    background: linear-gradient(135deg, #fff, #f3e5f5);
    border-radius: 28px;
    padding: 40px 24px;
    margin: 16px auto;
    max-width: 480px;
    min-height: 260px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(126, 87, 194, 0.18);
    border: 4px solid #ce93d8;
    transition: transform 0.25s;
    user-select: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .card:active { transform: scale(0.98); }
  .card .emoji { font-size: 4rem; margin-bottom: 12px; }
  .card .he { font-size: 2.4rem; font-weight: bold; color: #4527a0; }
  .card .ro { font-size: 2.2rem; font-weight: bold; color: #c2185b; margin-bottom: 8px; }
  .card .pron { font-size: 1.3rem; color: #555; margin-bottom: 12px; }
  .card .note { font-size: 0.95rem; color: #888; font-style: italic; max-width: 380px; }
  .card .hint { color: #999; margin-top: 14px; font-size: 0.9rem; }

  .nav-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(135deg, #42a5f5, #1e88e5);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 12px 22px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(30, 136, 229, 0.3);
    font-family: inherit;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn.speak { background: linear-gradient(135deg, #66bb6a, #43a047); }
  .btn.prev  { background: linear-gradient(135deg, #ab47bc, #8e24aa); }
  .btn.shuffle { background: linear-gradient(135deg, #ff7043, #f4511e); }

  /* quiz */
  .quiz-q {
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
    color: #4527a0;
    margin: 12px 0 4px;
  }
  .quiz-q .emoji { font-size: 2.2rem; display: block; margin-bottom: 4px; }
  .quiz-q .prompt { font-size: 1rem; color: #777; font-weight: normal; margin-top: 4px;}
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 480px) {
    .options { grid-template-columns: 1fr; }
  }
  .opt {
    background: white;
    border: 3px solid #e1bee7;
    border-radius: 18px;
    padding: 16px;
    font-size: 1.3rem;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    color: #4a148c;
    transition: all 0.12s;
  }
  .opt:hover { background: #f3e5f5; transform: translateY(-2px); }
  .opt.correct {
    background: linear-gradient(135deg, #a5d6a7, #66bb6a);
    color: white;
    border-color: #2e7d32;
    animation: pop 0.4s;
  }
  .opt.wrong {
    background: linear-gradient(135deg, #ef9a9a, #e57373);
    color: white;
    border-color: #c62828;
    animation: shake 0.4s;
  }
  .opt:disabled { cursor: default; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .feedback {
    text-align: center;
    margin-top: 16px;
    font-size: 1.4rem;
    font-weight: bold;
    min-height: 1.6rem;
  }
  .feedback.good { color: #2e7d32; }
  .feedback.bad  { color: #c62828; }

  /* match game */
  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .match-grid .opt {
    font-size: 1.15rem;
    padding: 14px 10px;
    min-height: 56px;
  }
  .match-grid .opt.selected {
    background: linear-gradient(135deg, #fff59d, #ffee58);
    border-color: #fbc02d;
  }
  .match-grid .opt.matched {
    background: linear-gradient(135deg, #c5e1a5, #aed581);
    border-color: #689f38;
    color: #33691e;
    opacity: 0.6;
    pointer-events: none;
  }

  /* pronunciation guide */
  .guide {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 16px;
    background: #fff8e1;
    border-radius: 16px;
    padding: 16px 20px;
    margin-top: 8px;
  }
  .guide .letter {
    font-weight: bold;
    color: #c2185b;
    font-size: 1.2rem;
  }
  .guide .desc { color: #555; }

  /* confetti */
  .confetti {
    position: fixed;
    pointer-events: none;
    font-size: 1.8rem;
    animation: fall 1.6s linear forwards;
    z-index: 9999;
  }
  @keyframes fall {
    to { transform: translateY(100vh) rotate(540deg); opacity: 0; }
  }

  .end-screen {
    text-align: center;
    padding: 24px;
  }
  .end-screen .big { font-size: 5rem; }
  .end-screen h2 { color: #d81b60; margin: 12px 0; }

  /* listen mode */
  .listen-area {
    text-align: center;
  }
  .listen-btn {
    background: linear-gradient(135deg, #66bb6a, #43a047);
    color: white;
    border: none;
    border-radius: 50%;
    width: 140px;
    height: 140px;
    font-size: 4rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(67, 160, 71, 0.4);
    margin: 20px auto;
    display: block;
    transition: transform 0.15s;
  }
  .listen-btn:hover { transform: scale(1.05); }
  .listen-btn:active { transform: scale(0.95); }

  /* sentences */
  .sentence-card { padding: 28px 20px; }
  .words-breakdown {
    background: #fff8e1;
    border-radius: 20px;
    padding: 16px 18px;
    margin-top: 18px;
    text-align: right;
  }
  .words-breakdown h3 { color: #c2185b; margin-bottom: 6px; }
  .word-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .word-chip {
    background: white;
    border: 2px solid #e0e0e0;
    border-radius: 14px;
    padding: 8px 12px;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    text-align: right;
    flex: 1 1 calc(50% - 8px);
    min-width: 180px;
  }
  .word-chip.known { border-color: #aed581; background: #f1f8e9; }
  .word-chip.new   { border-color: #ffb74d; background: #fff3e0; }
  .word-chip b { color: #c2185b; }
  .word-pron { display:block; color: #777; font-size: 0.9rem; margin-top: 2px; }
  .legend {
    display:flex; gap:14px; justify-content:center; margin-top:12px;
    font-size:0.9rem; color:#555;
  }
  .legend .dot { display:inline-block; width:12px; height:12px; border-radius:50%; margin-left:4px; vertical-align:middle; }
  .legend .dot.known { background:#aed581; }
  .legend .dot.new   { background:#ffb74d; }

  /* manage */
  .manage-tabs {
    display:flex; gap:8px; justify-content:center; margin-bottom:14px; flex-wrap:wrap;
  }
  .m-tab {
    background:white; border:3px solid #e0e0e0; border-radius:14px;
    padding:8px 16px; font-weight:bold; cursor:pointer; font-family:inherit; font-size:1rem;
  }
  .m-tab.active { background:linear-gradient(135deg,#ffb74d,#fb8c00); color:white; border-color:transparent; }
  .m-heading { color:#4527a0; margin:18px 0 10px; }
  .form-grid {
    display:grid; grid-template-columns: 1fr 1fr; gap:10px;
  }
  @media (max-width:520px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid label {
    display:flex; flex-direction:column; font-weight:bold; color:#555; font-size:0.95rem; gap:4px;
  }
  .form-grid input, .words-textarea {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 12px; font-size:1.05rem;
    font-family:inherit; outline:none; transition: border-color 0.15s;
  }
  .form-grid input:focus, .words-textarea:focus { border-color:#ba68c8; }
  .words-textarea { width:100%; min-height:120px; margin-top:8px; resize:vertical; direction:ltr; }
  .req { color:#e53935; }
  .m-table {
    width:100%; border-collapse:collapse; margin-top:8px; background:white; border-radius:12px; overflow:hidden;
  }
  .m-table th { background:#f3e5f5; color:#4a148c; padding:8px 6px; font-size:0.9rem; text-align:right; }
  .m-table td { padding:8px 6px; border-bottom:1px solid #f0f0f0; font-size:0.95rem; }
  .row-actions { display:flex; gap:4px; justify-content:flex-end; }
  .mini {
    background:white; border:2px solid #e0e0e0; border-radius:10px; padding:4px 8px;
    cursor:pointer; font-size:0.95rem; font-family:inherit;
  }
  .mini:hover { border-color:#ba68c8; }
  .mini.danger:hover { border-color:#e53935; background:#ffebee; }
  .empty-note { color:#888; text-align:center; padding:16px; background:#fafafa; border-radius:12px; }
  .io-row { display:flex; gap:8px; justify-content:center; margin-top:20px; flex-wrap:wrap; }
  .builtin-list { margin-top:16px; background:#fafafa; border-radius:12px; padding:8px 14px; }
  .builtin-list summary { cursor:pointer; font-weight:bold; color:#555; }
  code { background:#f3e5f5; padding:2px 6px; border-radius:6px; font-size:0.9rem; }

  /* user / admin tab */
  .user-stats {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap:10px; margin-bottom:20px;
  }
  .ustat {
    background: linear-gradient(135deg, #fce4ec, #e1bee7);
    border-radius:16px; padding:14px 8px; text-align:center;
    color:#4a148c; font-weight:bold;
  }
  .ustat .big { font-size:1.8rem; color:#d81b60; }

  .admin-box {
    background: #fafafa;
    border: 2px dashed #ce93d8;
    border-radius:18px; padding:14px 18px;
  }
  .admin-box > summary {
    cursor:pointer; font-weight:bold; color:#6a1b9a; font-size:1.1rem;
    padding:4px 0;
  }
  .admin-body { padding-top:8px; }
  .ext-row { display:flex; gap:8px; flex-wrap:wrap; margin:8px 0; }
  .ext-textarea {
    width:100%; min-height:180px; padding:12px 14px; border-radius:14px;
    border:2px solid #e0e0e0; font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size:0.95rem; outline:none; resize:vertical;
  }
  .ext-textarea:focus { border-color:#ba68c8; }
  .preview-box {
    background:#fff8e1; border-radius:16px; padding:14px 16px; margin-top:14px;
    border:2px solid #ffd54f;
  }
  .preview-box h4 { color:#e65100; margin-bottom:6px; }

  .pin-card {
    background:#fff; border:2px solid #e1bee7; border-radius:18px;
    padding:18px 20px; margin-top:8px;
  }
  .pin-card h3 { color:#6a1b9a; margin-bottom:8px; }
  .pin-row {
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;
  }
  .pin-row input {
    border:2px solid #e0e0e0; border-radius:12px; padding:10px 14px;
    font-size:1.4rem; font-family:inherit; outline:none;
    width:140px; text-align:center; letter-spacing:0.4em; direction:ltr;
  }
  .pin-row input:focus { border-color:#ba68c8; }
  .pin-error { color:#c62828; font-weight:bold; margin-top:8px; min-height:1.2em; }

  /* curriculum units */
  .unit-pill {
    background:linear-gradient(135deg,#fff3e0,#ffe0b2);
    border:2px solid #ffb74d; border-radius:14px;
    padding:6px 14px; font-weight:bold; color:#e65100;
    cursor:pointer; font-size:0.95rem;
  }
  .unit-pill:hover { transform:translateY(-1px); }
  .units-grid {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap:12px; max-width:720px; margin:0 auto;
  }
  .unit-tile {
    background:white; border:3px solid #e0e0e0; border-radius:18px;
    padding:14px 12px; text-align:right; cursor:pointer; font-family:inherit;
    transition:transform 0.15s, border-color 0.15s;
  }
  .unit-tile.unlocked:hover { transform:translateY(-2px); border-color:#ba68c8; }
  .unit-tile.locked { opacity:0.5; cursor:not-allowed; background:#fafafa; }
  .unit-tile.current { border-color:#fbc02d; background:linear-gradient(135deg,#fff8e1,#ffecb3); }
  .unit-tile .unit-num   { font-size:1.05rem; font-weight:bold; color:#4527a0; }
  .unit-tile .unit-name  { font-size:1.2rem; font-weight:bold; color:#c2185b; margin-top:4px; }
  .unit-tile .unit-meta  { font-size:0.85rem; color:#666; margin-top:4px; }
  .unit-tile .unit-hint  { font-size:0.85rem; color:#888; margin-top:4px; font-style:italic; }
  .unit-tile.current .unit-hint { color:#e65100; font-weight:bold; font-style:normal; }

  .unit-unlock-toast {
    position:fixed; left:50%; top:30%; transform:translateX(-50%);
    background:linear-gradient(135deg,#ff7043,#ffb74d);
    color:white; padding:18px 28px; border-radius:18px;
    font-size:1.3rem; font-weight:bold; text-align:center;
    box-shadow:0 12px 40px rgba(255,112,67,0.4);
    z-index:9999; animation: unitPop 0.4s ease-out;
  }
  @keyframes unitPop {
    0%   { transform:translate(-50%, -20px) scale(0.8); opacity:0; }
    100% { transform:translate(-50%, 0)     scale(1);   opacity:1; }
  }

  /* emoji picker */
  .emoji-grid {
    display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin-top:10px;
  }
  .emoji-tile {
    background:white; border:2px solid #e0e0e0; border-radius:14px;
    font-size:2rem; padding:8px; cursor:pointer; transition:transform 0.1s;
    aspect-ratio: 1;
    display:flex; align-items:center; justify-content:center;
  }
  .emoji-tile:hover { transform:scale(1.1); border-color:#ba68c8; }
  .emoji-tile.selected { background:linear-gradient(135deg,#fce4ec,#e1bee7); border-color:#ba68c8; box-shadow:0 0 0 3px rgba(186,104,200,0.3); }

  /* auth bar + overlays */
  /* `display: flex` etc. on these elements overrides the [hidden] UA rule,
     so we need an explicit reset to keep `hidden` working. */
  [hidden] { display: none !important; }

  .auth-bar {
    display:flex; justify-content:flex-end; align-items:center; gap:8px;
    max-width:720px; margin:0 auto 12px; flex-wrap:wrap;
  }
  .auth-bar .ab-greet { color:#555; font-weight:bold; }
  .auth-bar .ab-btn {
    background:white; border:2px solid #e0e0e0; border-radius:14px;
    padding:6px 14px; cursor:pointer; font-family:inherit; font-weight:bold;
    color:#4a148c; font-size:0.95rem;
  }
  .auth-bar .ab-btn:hover { border-color:#ba68c8; }
  .auth-bar .ab-primary {
    background:linear-gradient(135deg,#66bb6a,#43a047); color:white; border-color:transparent;
  }

  .auth-overlay {
    position:fixed; inset:0; z-index:1000;
    background:linear-gradient(135deg, rgba(252,228,236,0.97), rgba(227,242,253,0.97));
    display:flex; align-items:center; justify-content:center; padding:16px; overflow-y:auto;
  }
  .auth-card {
    background:white; border-radius:24px; padding:24px 28px;
    max-width:560px; width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    text-align:center;
  }
  .auth-card h2 { color:#d81b60; margin-bottom:8px; }
  .auth-card p.muted { color:#666; margin-bottom:14px; }
  .auth-card input[type=email], .auth-card input[type=text] {
    width:100%; padding:12px 14px; border:2px solid #e0e0e0; border-radius:14px;
    font-size:1.05rem; font-family:inherit; outline:none;
  }
  .auth-card input:focus { border-color:#ba68c8; }
  .auth-card .row { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

  .picker-grid {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap:14px; margin-top:18px;
  }
  .picker-tile {
    background:linear-gradient(135deg, #fff, #f3e5f5);
    border:3px solid #ce93d8; border-radius:20px;
    padding:18px 12px; text-align:center; cursor:pointer; font-family:inherit;
    transition:transform 0.15s;
  }
  .picker-tile:hover { transform:translateY(-2px); }
  .picker-tile .pt-emoji { font-size:3rem; display:block; }
  .picker-tile .pt-name  { font-weight:bold; color:#4527a0; margin-top:4px; }
  .picker-tile .pt-lock  { font-size:0.85rem; color:#888; margin-top:2px; }
  .picker-tile.add { border-style:dashed; }

  .contact-modal {
    position:fixed; inset:0; z-index:1001;
    background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center;
    padding:16px;
  }
  .contact-modal .auth-card { text-align:right; }
  .contact-modal textarea {
    width:100%; min-height:80px; padding:10px 12px; border:2px solid #e0e0e0;
    border-radius:12px; font-family:inherit; font-size:1rem; outline:none; resize:vertical;
  }
  .contact-modal textarea:focus { border-color:#ba68c8; }
  .honeypot {
    position:absolute; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0;
  }

  .request-row {
    background:white; border:1px solid #eee; border-radius:14px;
    padding:10px 14px; margin-bottom:8px;
  }
  .request-row.pending { border-right:6px solid #ffb74d; }
  .request-row.approved { border-right:6px solid #aed581; opacity:0.7; }
  .request-row.rejected { border-right:6px solid #ef9a9a; opacity:0.5; }
  .request-meta { color:#888; font-size:0.85rem; }
  .req-dot {
    display:inline-block; width:10px; height:10px; border-radius:50%;
    background:#e53935; vertical-align:middle; margin-right:6px;
    box-shadow:0 0 0 3px rgba(229,57,53,0.25);
  }

  footer {
    text-align: center;
    color: #888;
    font-size: 0.85rem;
    margin-top: 24px;
  }
</style>
<!-- Optional Supabase backend. App works in guest-only mode if config.js is absent. -->
<script src="config.js" onerror="window.APP_CONFIG = null;"></script>
<script type="module">
  try {
    if (window.APP_CONFIG && window.APP_CONFIG.SUPABASE_URL &&
        !/YOUR-PROJECT/i.test(window.APP_CONFIG.SUPABASE_URL)) {

      window._supabase = createClient(

];
function unitOf(n) { return UNITS.find(u => u.n === n) || UNITS[0]; }
function maxUnitForScore(score) {
  for (let i = UNITS.length - 1; i >= 0; i--) if (score >= UNITS[i].threshold) return UNITS[i].n;
  return 1;
}

// ====== Helpers ======
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
// A vocab/sentence row is "in scope" if it has no `unit` (Starter Pack or
// user-added) or its unit number is <= the kid's currently-selected unit.
function inUnitScope(row) {
  return row.unit == null || row.unit <= state.currentUnit;
}

function filtered() {
  const v = getVocab().filter(inUnitScope);
  return state.category === "הכול" ? v : v.filter(w => w.cat === state.category);
}
function pickRandom(arr, n, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return shuffle(pool).slice(0, n);
}
function pickOne(arr, exclude) {
  const pool = arr.filter(x => x !== exclude);
  return pool[Math.floor(Math.random() * pool.length)];
}
function speak(text) {
  if (!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ro-RO";
  u.rate = 0.85;
  // Try to find a Romanian voice
  const voices = speechSynthesis.getVoices();
  const ro = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ro"));
  if (ro) u.voice = ro;
  speechSynthesis.speak(u);
}
// Pre-load voices (some browsers populate async)
if ("speechSynthesis" in window) {
  speechSynthesis.onvoiceschanged = () => {};
}

function confetti() {
  const emojis = ["🎉", "⭐", "✨", "🎊", "🌟", "💖", "🦋", "🌈"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("div");
    el.className = "confetti";
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + "vw";
    el.style.top = "-40px";
    el.style.animationDuration = (1 + Math.random() * 1.2) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2400);
  }
}

function updateStats() {
  document.getElementById("score").textContent = state.score;
  document.getElementById("streak").textContent = state.streak;
  document.getElementById("seen").textContent = state.seen;
  if (typeof maybeUnlockNextUnit === 'function') maybeUnlockNextUnit();
  if (typeof saveProgressDebounced === 'function') saveProgressDebounced();

}

function pickFeedback(good) {
  const goods = ["מעולה! 🌟", "כל הכבוד! 💖", "כן! 🎉", "וואו! ✨", "מדהים! 🦋", "Foarte bine! 👏"];
  const bads  = ["אופס, נסי שוב 🤗", "כמעט! 💪", "לא נורא, ננסה עוד! 🌱", "פעם הבאה תפצחי 🔑"];
  return (good ? goods : bads)[Math.floor(Math.random() * (good ? goods.length : bads.length))];
}

// ====== Render: filters ======
function renderFilters() {
  const wrap = document.getElementById("filters");
  if (["guide", "manage", "sentences", "user", "units", "requests"].includes(state.mode)) { wrap.innerHTML = ""; return; }
  const cats = getCategories();
  wrap.innerHTML = cats.map(c =>
    `<button class="chip ${state.category === c ? "active" : ""}" data-cat="${c}">${getCategoryEmoji(c)} ${c}</button>`
  ).join("");
  wrap.querySelectorAll(".chip").forEach(b => {
    b.onclick = () => {
      state.category = b.dataset.cat;
      resetModeState();
      render();
    };
  });
}

function resetModeState() {
  state.flashIdx = 0;
  state.flashFlipped = false;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.quizCurrent = null;
  state.listenCurrent = null;
  state.matchPairs = [];
  state.matchSelected = null;
  state.matchMatched = new Set();
  state.sentenceIdx = 0;
  state.sentenceRevealed = false;
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  state.manageEditingId = null;
  state.manageDraft = null;
}

// ====== Render: flashcards ======
function renderFlash() {
  const list = filtered();
  if (list.length === 0) return "<p style='text-align:center'>אין מילים בקטגוריה הזו</p>";
  if (state.flashOrder.length === 0 || state.flashOrder.length !== list.length) {
    state.flashOrder = shuffle(list.map((_, i) => i));
  }
  const word = list[state.flashOrder[state.flashIdx]];
  const flipped = state.flashFlipped;

  return `
    <div class="flashcard-area">
      <p style="color:#888; font-size:0.95rem;">כרטיסייה ${state.flashIdx + 1} מתוך ${list.length} ${state.category !== "הכול" ? "(" + state.category + ")" : ""}</p>
      <div class="card" id="card">
        <div class="emoji">${word.emoji}</div>
        ${flipped ? `
          <div class="ro" id="ro-word">${word.ro}</div>
          <div class="pron">${word.pron}</div>
          <div class="note">${word.note}</div>
          <div class="hint">👆 לחיצה להפוך חזרה</div>
        ` : `
          <div class="he">${word.he}</div>
          <div class="hint">👆 לחיצה כדי לגלות את המילה ברומנית</div>
        `}
      </div>
      <div class="nav-row">
        <button class="btn prev" id="prev">⬅️ הקודמת</button>
        <button class="btn speak" id="speak">🔊 שמעי שוב</button>
        <button class="btn" id="next">הבאה ➡️</button>
        <button class="btn shuffle" id="shuffle">🔀 ערבבי</button>
      </div>
    </div>
  `;
}
function attachFlashEvents() {
  const list = filtered();
  const word = list[state.flashOrder[state.flashIdx]];
  document.getElementById("card").onclick = () => {
    state.flashFlipped = !state.flashFlipped;
    if (state.flashFlipped) {
      speak(word.ro);
      state.seen += 1;
      updateStats();
    }
    render();
  };
  document.getElementById("speak").onclick = (e) => { e.stopPropagation(); speak(word.ro); };
  document.getElementById("prev").onclick = () => {
    state.flashIdx = (state.flashIdx - 1 + list.length) % list.length;
    state.flashFlipped = false;
    render();
  };
  document.getElementById("next").onclick = () => {
    state.flashIdx = (state.flashIdx + 1) % list.length;
    state.flashFlipped = false;
    render();
  };
  document.getElementById("shuffle").onclick = () => {
    state.flashOrder = shuffle(list.map((_, i) => i));
    state.flashIdx = 0;
    state.flashFlipped = false;
    render();
  };
}

// ====== Render: match game (6 pairs) ======
function newMatch() {
  const list = filtered();
  const n = Math.min(6, list.length);
  const picks = shuffle(list).slice(0, n);
  // Build two columns: left = he, right = ro, shuffled independently
  const left = shuffle(picks.map((w, i) => ({ side: "he", id: i, label: w.emoji + " " + w.he })));
  const right = shuffle(picks.map((w, i) => ({ side: "ro", id: i, label: w.ro })));
  state.matchPairs = { picks, left, right };
  state.matchSelected = null;
  state.matchMatched = new Set();
}
function renderMatch() {
  const list = filtered();
  if (list.length < 4) return "<p style='text-align:center'>צריכים לפחות 4 מילים. בחרי קטגוריה אחרת או 'הכול' 🌈</p>";
  if (!state.matchPairs.picks) newMatch();
  const { left, right, picks } = state.matchPairs;
  const matched = state.matchMatched;
  const allDone = matched.size === picks.length;
  return `
    <p style="text-align:center; color:#555;">לחצי על מילה בעברית ואז על המילה המתאימה ברומנית 🧩</p>
    <div class="match-grid" id="matchGrid" style="margin-top:12px;">
      ${left.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "he" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("he-" + item.id) ? "matched" : ""}" data-side="he" data-id="${item.id}">${item.label}</button>
        ${(() => {
          // pair each row: not strictly aligned because right is independent, but visually 2 cols works fine
          return "";
        })()}
      `).join("")}
    </div>
    <div class="match-grid" id="matchGrid2" style="margin-top:10px;">
      ${right.map(item => `
        <button class="opt ${state.matchSelected && state.matchSelected.side === "ro" && state.matchSelected.id === item.id ? "selected" : ""} ${matched.has("ro-" + item.id) ? "matched" : ""}" data-side="ro" data-id="${item.id}">${item.label}</button>
      `).join("")}
    </div>
    <div class="feedback" id="fb">${allDone ? "🎉 כל הכבוד! מצאת את כל הזוגות!" : ""}</div>
    ${allDone ? `<div class="nav-row"><button class="btn" id="nextMatch">🔁 סבב חדש</button></div>` : ""}
  `;
}
function attachMatchEvents() {
  const { picks } = state.matchPairs;
  const handler = (btn) => {
    const side = btn.dataset.side;
    const id = parseInt(btn.dataset.id, 10);
    if (state.matchMatched.has(side + "-" + id)) return;
    if (!state.matchSelected) {
      state.matchSelected = { side, id };
      render();
      return;
    }
    if (state.matchSelected.side === side && state.matchSelected.id === id) {
      state.matchSelected = null;
      render();
      return;
    }
    // We have a previous selection — check match
    const a = state.matchSelected;
    const b = { side, id };
    if (a.side !== b.side && a.id === b.id) {
      state.matchMatched.add("he-" + a.id);
      state.matchMatched.add("ro-" + a.id);
      state.matchMatched.add("he-" + b.id);
      state.matchMatched.add("ro-" + b.id);
      state.score += 10;
      state.streak += 1;
      state.seen += 1;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      updateStats();
      speak(picks[a.id].ro);
      state.matchSelected = null;
      const allDone = state.matchMatched.size / 2 === picks.length;
      render();
      if (allDone) confetti();
    } else {
      state.streak = 0;
      updateStats();
      state.matchSelected = null;
      // brief shake feedback
      btn.classList.add("wrong");
      setTimeout(() => { render(); }, 350);
    }
  };
  document.querySelectorAll("#matchGrid .opt, #matchGrid2 .opt").forEach(b => {
    b.onclick = () => handler(b);
  });
  const nx = document.getElementById("nextMatch");
  if (nx) nx.onclick = () => { newMatch(); render(); };
}

// ====== Render: sentences ======
function knownWord(ro) {
  // Match against vocab (case-insensitive, strip punctuation)
  const norm = s => s.toLowerCase().replace(/[.,!?;:'"()\-]/g, "").trim();
  const n = norm(ro);
  return getVocab().some(w => norm(w.ro) === n);
}
function renderSentences() {
  const list = getSentencesInScope();
  if (list.length === 0) return "<p style='text-align:center'>אין משפטים. אפשר להוסיף ב-📝 הוסיפי</p>";
  if (!state.sentenceOrder.length || state.sentenceOrder.length !== list.length) {
    state.sentenceOrder = shuffle(list.map((_, i) => i));
  }
  const s = list[state.sentenceOrder[state.sentenceIdx]];
  const revealed = state.sentenceRevealed;
  const wordsHtml = (s.words || []).map((w, i) => {
    const known = knownWord(w.ro);
    return `<button class="word-chip ${known ? "known" : "new"}" data-ro="${encodeURIComponent(w.ro)}">
      ${known ? "✅" : "🆕"} <b>${w.ro}</b> — ${w.he}
      <span class="word-pron">${w.pron}</span>
    </button>`;
  }).join("");
  return `
    <div style="text-align:center;">
      <p style="color:#888;">משפט ${state.sentenceIdx + 1} מתוך ${list.length} ${s.theme ? "· " + s.theme : ""}</p>
      <div class="card sentence-card" id="sentenceCard">
        <div class="emoji">${s.emoji || "💬"}</div>
        <div class="he" style="font-size:2rem;">${s.he}</div>
        ${revealed ? `
          <div class="ro" style="margin-top:14px; font-size:1.8rem;">${s.ro}</div>
          <div class="pron">${s.pron}</div>
        ` : `<div class="hint" style="margin-top:18px;">👆 לחיצה לגלות את המשפט ברומנית</div>`}
      </div>
      <div class="nav-row">
        <button class="btn prev" id="sPrev">⬅️ הקודם</button>
        <button class="btn speak" id="sSpeak">🔊 השמיעי</button>
        <button class="btn" id="sNext">הבא ➡️</button>
        <button class="btn shuffle" id="sShuffle">🔀 ערבבי</button>
      </div>
      ${revealed && s.words && s.words.length ? `
        <div class="words-breakdown">
          <h3>🔍 מילים מהמשפט</h3>
          <p class="hint" style="margin-bottom:10px;">לחיצה על כל מילה כדי לשמוע אותה</p>
          <div class="word-list">${wordsHtml}</div>
          <div class="legend">
            <span><span class="dot known"></span> כבר למדת</span>
            <span><span class="dot new"></span> מילה חדשה ללמוד</span>
          </div>
        </div>` : ""}
    </div>
  `;
}
function attachSentenceEvents() {
  const list = getSentencesInScope();
  const s = list[state.sentenceOrder[state.sentenceIdx]];
  document.getElementById("sentenceCard").onclick = () => {
    state.sentenceRevealed = !state.sentenceRevealed;
    if (state.sentenceRevealed) { speak(s.ro); state.seen += 1; updateStats(); }
    render();
  };
  document.getElementById("sSpeak").onclick = (e) => { e.stopPropagation(); speak(s.ro); };
  document.getElementById("sPrev").onclick = () => {
    state.sentenceIdx = (state.sentenceIdx - 1 + list.length) % list.length;
    state.sentenceRevealed = false; render();
  };
  document.getElementById("sNext").onclick = () => {
    state.sentenceIdx = (state.sentenceIdx + 1) % list.length;
    state.sentenceRevealed = false; render();
  };
  document.getElementById("sShuffle").onclick = () => {
    state.sentenceOrder = shuffle(list.map((_, i) => i));
    state.sentenceIdx = 0; state.sentenceRevealed = false; render();
  };
  document.querySelectorAll(".word-chip").forEach(b => {
    b.onclick = () => speak(decodeURIComponent(b.dataset.ro));
  });
}

function escapeHtml(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function attachManageEvents() {
  document.querySelectorAll(".m-tab").forEach(b => {
    b.onclick = () => {
      state.manageTab = b.dataset.mtab;
      state.manageEditingId = null;
      state.manageDraft = null;
      render();
    };
  });

  // Collect inputs into a draft so render() doesn't lose typed-but-unsaved values when re-rendered
  const collect = () => {
    const get = id => (document.getElementById(id) || {}).value || "";
    if (state.manageTab === "words") {
      return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
               pron: get("f-pron").trim(), cat: get("f-cat").trim() || "שונות",
               emoji: get("f-emoji").trim() || "✨", note: get("f-note").trim() };
    }
    const wordsRaw = get("f-words");
    const words = wordsRaw.split("\n").map(line => {
      const parts = line.split("|").map(s => s.trim());
      if (parts.length < 2 || !parts[0] || !parts[1]) return null;
      return { ro: parts[0], he: parts[1], pron: parts[2] || "" };
    }).filter(Boolean);
    return { id: state.manageEditingId, he: get("f-he").trim(), ro: get("f-ro").trim(),
             pron: get("f-pron").trim(), theme: get("f-theme").trim(),
             emoji: get("f-emoji").trim() || "💬", words };
  };

  const save = () => {
    const d = collect();
    if (!d.he || !d.ro) { alert("חובה למלא עברית ורומנית"); return; }
    const list = state.manageTab === "words" ? userVocab : userSentences;
    if (state.manageEditingId) {
      const i = list.findIndex(x => x.id === state.manageEditingId);
      if (i >= 0) list[i] = { ...list[i], ...d, id: state.manageEditingId };
    } else {
      d.id = "u" + Date.now() + Math.floor(Math.random() * 1000);
      list.push(d);
    }
    if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
    state.manageEditingId = null;
    state.manageDraft = null;
    // invalidate orders since vocab/sentence count changed
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
    render();
  };

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) saveBtn.onclick = save;
  const cancelBtn = document.getElementById("cancelBtn");
  if (cancelBtn) cancelBtn.onclick = () => {
    state.manageEditingId = null; state.manageDraft = null; render();
  };
  const testBtn = document.getElementById("testSpeak");
  if (testBtn) testBtn.onclick = () => {
    const ro = (document.getElementById("f-ro") || {}).value || "";
    if (ro) speak(ro);
  };

  // Row actions
  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      const list = state.manageTab === "words" ? userVocab : userSentences;
      const item = list.find(x => x.id === id);
      if (!item) return;
      if (action === "speak") speak(item.ro);
      else if (action === "edit") {
        state.manageEditingId = id;
        state.manageDraft = { ...item };
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else if (action === "delete") {
        if (!confirm("למחוק את \"" + item.he + "\"?")) return;
        const i = list.findIndex(x => x.id === id);
        if (i >= 0) list.splice(i, 1);
        if (state.manageTab === "words") saveUserVocab(); else saveUserSentences();
        state.flashOrder = shuffle(filtered().map((_, i) => i));
        state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
        render();
      }
    };
  });

  // Built-in speak
  document.querySelectorAll("[data-builtin-speak]").forEach(b => {
    b.onclick = () => speak(b.dataset.builtinSpeak);
  });

  // Export / import / reset
  const exportBtn = document.getElementById("exportBtn");
  if (exportBtn) exportBtn.onclick = () => {
    const data = { exportedAt: new Date().toISOString(), userVocab, userSentences, stats: { score: state.score, bestStreak: state.bestStreak, seen: state.seen } };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "romanian-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };
  const importBtn = document.getElementById("importBtn");
  if (importBtn) importBtn.onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };
  const resetBtn = document.getElementById("resetBtn");
  if (resetBtn) resetBtn.onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };
}

function newId() { return "u" + Date.now() + Math.floor(Math.random() * 1000000); }

// Parses a markdown table in the format the user paste:
// | קטגוריה | עברית | רומנית | הגייה | הערות |
// Category cells are sticky — empty category inherits previous.
function parseMarkdownTable(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim());
  let currentCat = "";
  const words = [];
  for (const line of lines) {
    if (!line.startsWith("|")) continue;
    if (/^\|[\s:|\-]+$/.test(line)) continue; // separator like |---|---|
    let cells = line.split("|").map(c => c.trim().replace(/\*\*/g, "").replace(/__/g, ""));
    if (cells.length && cells[0] === "") cells.shift();
    if (cells.length && cells[cells.length - 1] === "") cells.pop();
    if (cells.length < 3) continue;
    const [cat, he, ro, pron, note] = cells;
    // Skip header rows
    if (/^רומנית/.test(ro) || /^Romanian/i.test(ro) || he === "עברית" || he === "Hebrew") continue;
    if (cat) currentCat = cat;
    if (!he || !ro) continue;
    words.push({
      id: newId() + "-" + words.length,
      he, ro,
      pron: pron || "",
      cat: currentCat || "מילון מורחב",
      emoji: "✨",
      note: note || "",
    });
  }
  return { words, sentences: [] };
}

// Parses JSON in several shapes:
//   - Existing export: { userVocab, userSentences }
//   - { words, sentences }
//   - Plain array → treated as words
function parseJsonDictionary(text) {
  const data = JSON.parse(text);
  let words = [], sentences = [];
  if (Array.isArray(data)) {
    words = data;
  } else if (data.userVocab !== undefined || data.userSentences !== undefined) {
    words = data.userVocab || [];
    sentences = data.userSentences || [];
  } else if (data.words !== undefined || data.sentences !== undefined) {
    words = data.words || [];
    sentences = data.sentences || [];
  } else {
    throw new Error("פורמט לא מזוהה");
  }
  words = (words || []).filter(w => w && w.he && w.ro).map(w => ({
    id: w.id || newId(),
    he: w.he, ro: w.ro,
    pron: w.pron || "",
    cat: w.cat || "מילון מורחב",
    emoji: w.emoji || "✨",
    note: w.note || "",
  }));
  sentences = (sentences || []).filter(s => s && s.he && s.ro).map(s => ({
    id: s.id || newId(),
    he: s.he, ro: s.ro,
    pron: s.pron || "",
    emoji: s.emoji || "💬",
    theme: s.theme || "",
    words: Array.isArray(s.words) ? s.words : [],
  }));
  return { words, sentences };
}

function parseExtension(text) {
  const trimmed = text.trim();
  if (!trimmed) throw new Error("הטקסט ריק");
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    return { type: "json", ...parseJsonDictionary(trimmed) };
  }
  if (trimmed.includes("|")) {
    return { type: "markdown", ...parseMarkdownTable(trimmed) };
  }
  throw new Error("לא זוהה פורמט. צריך JSON או טבלת Markdown");
}

          const data = JSON.parse(r.result);
          if (Array.isArray(data.userVocab)) userVocab = data.userVocab;
          if (Array.isArray(data.userSentences)) userSentences = data.userSentences;
          saveUserVocab(); saveUserSentences();
          alert("ייובא בהצלחה ✨");
          render();
        } catch (err) { alert("הקובץ לא תקין: " + err.message); }
      };
      r.readAsText(file);
    };
    inp.click();
  };

  document.getElementById("uResetVocab").onclick = () => {
    if (!confirm("למחוק את כל המילים והמשפטים שהוספת? (המובנים יישארו)")) return;
    userVocab = []; userSentences = [];
    saveUserVocab(); saveUserSentences();
    render();
  };

  document.getElementById("uResetProgress").onclick = () => {
    if (!confirm("לאפס נקודות, רצף שיא ומונה תרגולים?")) return;
    state.score = 0; state.bestStreak = 0; state.streak = 0; state.seen = 0;
    state.maxUnlockedUnit = 1; state.currentUnit = 1;
    try { localStorage.setItem("ro-kids-stats", JSON.stringify({})); } catch (e) {}
    render();
  };
}

// ====== Render: curriculum unit picker ======
function renderUnits() {
  const tiles = UNITS.map(u => {
    const unlocked = u.n <= state.maxUnlockedUnit;
    const current = u.n === state.currentUnit;
    const hint = unlocked
      ? (current ? '✓ נוכחית' : 'זמינה')
      : `נעולה · ${u.threshold - state.score} נקודות עד הפתיחה`;
    const vocabInUnit = getVocab().filter(w => w.unit === u.n).length;
    const sentencesInUnit = getSentences().filter(s => s.unit === u.n).length;
    return `
      <button class="unit-tile ${unlocked ? 'unlocked' : 'locked'} ${current ? 'current' : ''}" data-unit="${u.n}" ${unlocked ? '' : 'disabled'}>
        <div class="unit-num">${unlocked ? u.emoji : '🔒'} יחידה ${u.n}</div>
        <div class="unit-name">${escapeHtml(u.name)}</div>
        <div class="unit-meta">${vocabInUnit} מילים · ${sentencesInUnit} משפטים</div>
        <div class="unit-hint">${hint}</div>
      </button>`;
  }).join('');
  return `
    <h2 style="text-align:center; color:#d81b60; margin-bottom:6px;">📚 יחידות לימוד</h2>
    <p class="hint" style="text-align:center; margin-bottom:14px;">
      התרגול ביחידה N כולל את כל המילים והמשפטים מהמילון הבסיסי, הוספות שלך, ויחידות 1 עד N.
    </p>
    <div class="units-grid">${tiles}</div>
  `;
}

function attachUnitsEvents() {
  document.querySelectorAll('.unit-tile[data-unit]').forEach(b => {
    b.onclick = () => {
      const n = parseInt(b.dataset.unit, 10);
      if (n > state.maxUnlockedUnit) return;
      state.currentUnit = n;
      // reset shuffle orders so the new pool reflects
      state.flashOrder = shuffle(filtered().map((_, i) => i));
      state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
      state.flashIdx = 0; state.sentenceIdx = 0; state.flashFlipped = false; state.sentenceRevealed = false;
      // jump back to last-used practice mode (flash by default)
      state.mode = 'flash';
      document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
      const flashBtn = document.querySelector('.modes button[data-mode="flash"]');
      if (flashBtn) flashBtn.classList.add('active');
      render();
    };
  });
}

// ====== Unit unlocking ======
function maybeUnlockNextUnit() {
  const calculatedMax = maxUnitForScore(state.score);
  if (calculatedMax > state.maxUnlockedUnit) {
    state.maxUnlockedUnit = calculatedMax;
    state.currentUnit = calculatedMax;  // auto-advance to the new unit
    showUnitUnlock(calculatedMax);
    state.flashOrder = shuffle(filtered().map((_, i) => i));
    state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  }
}

function showUnitUnlock(n) {
  const u = unitOf(n);
  const t = document.createElement('div');
  t.className = 'unit-unlock-toast';
  t.innerHTML = `🎉 יחידה ${n} נפתחה!<br><b>${u.emoji} ${escapeHtml(u.name)}</b>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ====== Auth controller ======
// All Supabase-backed state lives here. When `auth.session` is set AND a profile
// is selected, the app is in "authed mode" — reads/writes target Supabase.
// Otherwise it's "guest mode" — localStorage as before.
const auth = {
  client: null, session: null, family: null,
  profiles: [], currentProfile: null,
  isAdmin: false,
  view: 'guest',                  // 'guest' | 'signing_in' | 'check_email' | 'picker' | 'pin' | 'app'
  signinMode: 'signin',           // 'signin' | 'signup'
  pendingPinProfile: null,
  realtimeChannel: null,
  unreadRequests: 0,
};
function isAuthed() { return !!(auth.session && auth.family && auth.currentProfile); }
function looksLikeUuid(s) {
  return typeof s === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s);
}

async function initAuth() {
  if (window._supabase) {
    auth.client = window._supabase;
    const { data } = await auth.client.auth.getSession();
    if (data && data.session) await handleSignedIn(data.session);
    auth.client.auth.onAuthStateChange(async (event, sess) => {
      if (event === 'SIGNED_OUT') await clearLocalSession();
      else if (event === 'SIGNED_IN' && sess && !auth.session) await handleSignedIn(sess);
    });
  }
  renderAuthBar();
  renderAuthOverlay();
  applyModeVisibility();
  attachContactLink();
}

async function clearLocalSession() {
  auth.session = null; auth.family = null; auth.profiles = [];
  auth.currentProfile = null; auth.isAdmin = false; auth.view = 'guest';
  if (auth.realtimeChannel) {
    try { await auth.client.removeChannel(auth.realtimeChannel); } catch (e) {}
    auth.realtimeChannel = null;
  }
  auth.unreadRequests = 0;
  loadGuestVocab(); loadGuestSentences(); loadGuestStats();
  state.streak = 0;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
  renderAuthBar(); renderAuthOverlay(); applyModeVisibility(); render();
}

function loadGuestVocab() {
  try { userVocab = JSON.parse(localStorage.getItem(USER_VOCAB_KEY) || "[]"); } catch (e) { userVocab = []; }
}
function loadGuestSentences() {
  try { userSentences = JSON.parse(localStorage.getItem(SENTENCES_KEY) || "[]"); } catch (e) { userSentences = []; }
}
function loadGuestStats() {
  try {
    const saved = JSON.parse(localStorage.getItem("ro-kids-stats") || "{}");
    state.score = saved.score || 0;
    state.bestStreak = saved.bestStreak || 0;
    state.seen = saved.seen || 0;
  } catch (e) {}
}

async function handleSignedIn(session) {
  auth.session = session;
  auth.isAdmin = (session.user && session.user.user_metadata && session.user.user_metadata.role === 'admin');
  await ensureFamily();
  await loadProfiles();
  applyModeVisibility();
  // Auto-resume last profile if no PIN
  let lastId = null;
  try { lastId = localStorage.getItem('ro-kids-last-profile'); } catch (e) {}
  const last = auth.profiles.find(p => p.id === lastId);
  if (last && !last.pin) {
    await selectProfile(last);
  } else {
    auth.view = 'picker';
  }
  if (auth.isAdmin) subscribeAdminRealtime();
  renderAuthBar(); renderAuthOverlay();
}

async function ensureFamily() {
  const { data: fams } = await auth.client.from('families')
    .select('*').eq('owner_user_id', auth.session.user.id).limit(1);
  if (fams && fams.length) { auth.family = fams[0]; return; }
  const defaultName = (auth.session.user.email || 'family').split('@')[0];
  const { data: created, error } = await auth.client.from('families')
    .insert({ owner_user_id: auth.session.user.id, name: defaultName })
    .select().single();
  if (error) { console.error('create family', error); return; }
  auth.family = created;
}

async function loadProfiles() {
  if (!auth.family) return;
  const { data } = await auth.client.from('profiles')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  auth.profiles = data || [];
}

async function selectProfile(profile) {
  auth.currentProfile = profile;
  auth.view = 'app';
  try { localStorage.setItem('ro-kids-last-profile', profile.id); } catch (e) {}
  await loadFamilyData();
  renderAuthBar(); renderAuthOverlay(); render();
}

async function loadFamilyData() {
  if (!auth.family || !auth.currentProfile) return;
  const { data: vocab } = await auth.client.from('vocab')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  userVocab = (vocab || []).map(v => ({ ...v, note: v.note || '' }));
  const { data: sentences } = await auth.client.from('sentences')
    .select('*').eq('family_id', auth.family.id).order('created_at');
  userSentences = (sentences || []).map(s => ({ ...s, words: Array.isArray(s.words) ? s.words : [] }));
  const { data: prog } = await auth.client.from('progress')
    .select('*').eq('profile_id', auth.currentProfile.id).maybeSingle();
  if (prog) {
    state.score = prog.score || 0;
    state.bestStreak = prog.best_streak || 0;
    state.seen = prog.seen || 0;
    state.maxUnlockedUnit = prog.max_unlocked_unit || maxUnitForScore(state.score);
  } else {
    state.score = 0; state.bestStreak = 0; state.seen = 0;
    state.maxUnlockedUnit = 1;
    try { await auth.client.from('progress').insert({ profile_id: auth.currentProfile.id, max_unlocked_unit: 1 }); } catch (e) {}
  }
  state.currentUnit = state.maxUnlockedUnit;
  state.streak = 0;
  state.flashOrder = shuffle(filtered().map((_, i) => i));
  state.sentenceOrder = shuffle(getSentencesInScope().map((_, i) => i));
}

// --- Data sync to Supabase (called after every local mutation when authed) ---
async function syncVocabFull() {
  if (!isAuthed()) return;
  // Delete server rows whose ids are not in our local set (uuid-only)
  const keepIds = userVocab.filter(w => looksLikeUuid(w.id)).map(w => w.id);
  let delQ = auth.client.from('vocab').delete().eq('family_id', auth.family.id);
  if (keepIds.length) delQ = delQ.not('id', 'in', '(' + keepIds.map(id => '"' + id + '"').join(',') + ')');
  try { await delQ; } catch (e) {}
  // Upsert each local row; assign UUID for new ones
  for (let i = 0; i < userVocab.length; i++) {
    const w = userVocab[i];
    const payload = {
      family_id: auth.family.id,
      he: w.he, ro: w.ro,
      pron: w.pron || null, cat: w.cat || null,
      emoji: w.emoji || '✨', note: w.note || null,
      added_by_profile_id: auth.currentProfile?.id || null,
    };
    if (looksLikeUuid(w.id)) payload.id = w.id;
    const { data } = await auth.client.from('vocab').upsert(payload).select().single();
    if (data) userVocab[i] = { ...userVocab[i], ...data };
  }
}

async function syncSentencesFull() {
  if (!isAuthed()) return;
  const keepIds = userSentences.filter(s => looksLikeUuid(s.id)).map(s => s.id);
  let delQ = auth.client.from('sentences').delete().eq('family_id', auth.family.id);
  if (keepIds.length) delQ = delQ.not('id', 'in', '(' + keepIds.map(id => '"' + id + '"').join(',') + ')');
  try { await delQ; } catch (e) {}
  for (let i = 0; i < userSentences.length; i++) {
    const s = userSentences[i];
    const payload = {
      family_id: auth.family.id,
      he: s.he, ro: s.ro,
      pron: s.pron || null, emoji: s.emoji || '💬',
      theme: s.theme || null,
      words: s.words || [],
      added_by_profile_id: auth.currentProfile?.id || null,
    };
    if (looksLikeUuid(s.id)) payload.id = s.id;
    const { data } = await auth.client.from('sentences').upsert(payload).select().single();
    if (data) userSentences[i] = { ...userSentences[i], ...data };
  }
}

let _progressTimer = null;
function saveProgressDebounced() {
  if (!isAuthed()) return;
  clearTimeout(_progressTimer);
  _progressTimer = setTimeout(async () => {
    try {
      await auth.client.from('progress').upsert({
        profile_id: auth.currentProfile.id,
        score: state.score,
        best_streak: state.bestStreak,
        seen: state.seen,
        max_unlocked_unit: state.maxUnlockedUnit,
        updated_at: new Date().toISOString(),
      });
    } catch (e) { console.warn('progress sync', e); }
  }, 1500);
}

    <button class="picker-tile" data-id="${p.id}">
      <span class="pt-emoji">${p.emoji || '🌟'}</span>
      <span class="pt-name">${escapeHtml(p.name)}</span>
      ${p.pin ? `<span class="pt-lock">🔒 PIN</span>` : ''}
    </button>`).join('');
  return `
    <div class="auth-card">
      <h2>👨‍👧 מי משחקת היום?</h2>
      <p class="muted">${auth.profiles.length === 0 ? 'בואי נוסיף פרופיל ראשון.' : 'בחרי פרופיל'}</p>
      <div class="picker-grid">
        ${tiles}
        <button class="picker-tile add" id="add-profile">
          <span class="pt-emoji">➕</span>
          <span class="pt-name">פרופיל חדש</span>
        </button>
      </div>
      <div class="row" style="margin-top:14px;">
        ${auth.profiles.length ? `<button class="btn prev" id="manage-profiles">✏️ ניהול פרופילים</button>` : ''}
      </div>
    </div>`;
}
function renderPinCard() {
  const p = auth.pendingPinProfile;
  return `
    <div class="auth-card">
      <h2>${p?.emoji || '🔒'} PIN של ${escapeHtml(p?.name || '')}</h2>
      <input type="password" id="pin-entry" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" placeholder="• • • •" autocomplete="off" style="letter-spacing:0.4em; text-align:center; direction:ltr; font-size:1.5rem;">
      <div class="row">
        <button class="btn speak" id="pin-submit">פתחי</button>
        <button class="btn prev" id="pin-back">חזרה</button>
      </div>
      <div id="pin-err" style="color:#c62828; font-weight:bold; min-height:1.2em; margin-top:8px;"></div>
    </div>`;
}

function attachOverlayEvents() {
  const cancel = document.getElementById('signin-cancel');
  if (cancel) cancel.onclick = () => { auth.view = auth.session ? 'app' : 'guest'; renderAuthOverlay(); };

  // Sign-in / sign-up tabs
  const tIn = document.getElementById('tab-signin');
  if (tIn) tIn.onclick = () => { auth.signinMode = 'signin'; renderAuthOverlay(); };
  const tUp = document.getElementById('tab-signup');
  if (tUp) tUp.onclick = () => { auth.signinMode = 'signup'; renderAuthOverlay(); };

  const submitBtn = document.getElementById('signin-submit');
  if (submitBtn) {
    const emailEl = document.getElementById('signin-email');
    const passEl  = document.getElementById('signin-password');
    const pass2El = document.getElementById('signin-password2');
    const fb      = document.getElementById('signin-feedback');
    const isSignup = auth.signinMode === 'signup';

    const submit = async () => {
      const email = (emailEl.value || '').trim();
      const password = (passEl.value || '');
      const password2 = pass2El ? (pass2El.value || '') : '';
      fb.textContent = '';
      if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) { fb.textContent = 'אימייל לא תקין'; return; }
      if (password.length < 6) { fb.textContent = 'סיסמה חייבת 6+ תווים'; return; }
      if (isSignup && password !== password2) { fb.textContent = 'הסיסמאות לא תואמות'; return; }

      submitBtn.disabled = true; submitBtn.textContent = '...';
      const result = isSignup
        ? await signUpWithPassword(email, password)
        : await signInWithPassword(email, password);
      submitBtn.disabled = false;

      if (result.error) {
        fb.textContent = result.error.message || 'שגיאה';
        submitBtn.textContent = isSignup ? 'הרשמה' : 'כניסה';
        return;
      }
      // onAuthStateChange will route the rest
    };
    submitBtn.onclick = submit;
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    if (pass2El) pass2El.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    emailEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') passEl.focus();
    });
    setTimeout(() => emailEl.focus(), 50);
  }

  const magic = document.getElementById('signin-magic');
  if (magic) magic.onclick = (e) => {
    e.preventDefault();
    const email = (document.getElementById('signin-email').value || '').trim();
    if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
      document.getElementById('signin-feedback').textContent = 'הזיני אימייל קודם';
      return;
    }
    signInMagicLink(email);
  };

  const oc = document.getElementById('open-contact');
  if (oc) oc.onclick = (e) => { e.preventDefault(); openContactModal(); };

  document.querySelectorAll('.picker-tile[data-id]').forEach(tile => {
    tile.onclick = () => {
      const p = auth.profiles.find(x => x.id === tile.dataset.id);
      if (!p) return;
      if (p.pin) { auth.pendingPinProfile = p; auth.view = 'pin'; renderAuthOverlay(); }
      else selectProfile(p);
    };
  });
  const addP = document.getElementById('add-profile');
  if (addP) addP.onclick = createProfileFlow;
  const mp = document.getElementById('manage-profiles');
  if (mp) mp.onclick = manageProfilesFlow;

  const pinSubmit = document.getElementById('pin-submit');
  if (pinSubmit) {
    const inp = document.getElementById('pin-entry');
    const err = document.getElementById('pin-err');
    const submit = () => {
      const v = (inp.value || '').trim();
      if (v === auth.pendingPinProfile.pin) {
        const p = auth.pendingPinProfile;
        auth.pendingPinProfile = null;
        selectProfile(p);
      } else {
        err.textContent = '❌ קוד שגוי';
        inp.value = ''; inp.focus();
      }
    };
    pinSubmit.onclick = submit;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    setTimeout(() => inp.focus(), 50);
    document.getElementById('pin-back').onclick = () => { auth.pendingPinProfile = null; auth.view = 'picker'; renderAuthOverlay(); };
  }
}

// 20 curated emojis suitable for kid profile avatars — gender/culture neutral.
const PROFILE_EMOJIS = [
  '🌟','⭐','🌈','✨','🌸','🌻','🍀','🦋',
  '🐱','🐶','🦊','🐰','🐻','🐼','🦁','🐯',
  '🐸','🦄','🐙','🦉',
];

// Renders an emoji-picker modal on the contact-modal div (reusing the same overlay slot).
// Resolves to the selected emoji string, or null if cancelled.
function openEmojiPicker({ current } = {}) {
  return new Promise(resolve => {
    const m = document.getElementById('contact-modal');
    if (!m) return resolve(null);
    m.hidden = false;
    m.innerHTML = `
      <div class="auth-card" style="max-width:380px;">
        <h2>בחרי אימוג'י</h2>
        <div class="emoji-grid">
          ${PROFILE_EMOJIS.map(e => `
            <button class="emoji-tile ${e === current ? 'selected' : ''}" data-e="${e}">${e}</button>
          `).join('')}
        </div>
        <div class="row" style="margin-top:14px;">
          <button class="btn prev" id="emoji-cancel">ביטול</button>
        </div>
      </div>
    `;
    const close = (val) => { m.hidden = true; m.innerHTML = ''; resolve(val); };
    m.querySelectorAll('.emoji-tile').forEach(b => {
      b.onclick = () => close(b.dataset.e);
    });
    document.getElementById('emoji-cancel').onclick = () => close(null);
    // outside-tap dismiss
    m.onclick = (e) => { if (e.target === m) close(null); };
  });
}

async function createProfileFlow() {
  if (auth.profiles.length >= 10) { alert('עד 10 פרופילים למשפחה'); return; }
  const name = prompt('שם הפרופיל:');
  if (!name) return;
  const picked = await openEmojiPicker({ current: '🌟' });
  const emoji = picked || '🌟';
  const { data, error } = await auth.client.from('profiles').insert({
    family_id: auth.family.id, name: name.trim(), emoji,
  }).select().single();
  if (error) { alert('שגיאה: ' + error.message); return; }
  auth.profiles.push(data);
  renderAuthOverlay();
}

async function manageProfilesFlow() {
  const list = auth.profiles.map((p, i) => `${i + 1}. ${p.emoji || '🌟'} ${p.name}${p.pin ? ' 🔒' : ''}`).join('\n');
  const idx = prompt('בחרי פרופיל לעריכה (מספר):\n\n' + list);
  if (!idx) return;
  const i = parseInt(idx, 10) - 1;
  const p = auth.profiles[i];
  if (!p) return;
  const action = prompt(`פרופיל: ${p.emoji || '🌟'} ${p.name}\n\n1 = שנה שם\n2 = שנה אימוג'י\n3 = ${p.pin ? 'הסר' : 'הגדר'} PIN\n4 = מחק`);
  if (action === '1') {
    const nn = prompt('שם חדש:', p.name);
    if (nn) { await auth.client.from('profiles').update({ name: nn.trim() }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); renderAuthBar(); }
  } else if (action === '2') {
    const ne = await openEmojiPicker({ current: p.emoji || '🌟' });
    if (ne) { await auth.client.from('profiles').update({ emoji: ne }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); renderAuthBar(); }
  } else if (action === '3') {
    if (p.pin) {
      if (confirm('להסיר PIN?')) { await auth.client.from('profiles').update({ pin: null }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); }
    } else {
      const np = prompt('PIN חדש (4 ספרות):');
      if (np && /^\d{4}$/.test(np)) { await auth.client.from('profiles').update({ pin: np }).eq('id', p.id); await loadProfiles(); renderAuthOverlay(); }
      else if (np) alert('PIN חייב להיות 4 ספרות');
    }
  } else if (action === '4') {
    if (confirm(`למחוק את ${p.name}? פעולה בלתי הפיכה.`)) {
      await auth.client.from('profiles').delete().eq('id', p.id);
      await loadProfiles();
      if (auth.currentProfile && auth.currentProfile.id === p.id) {
        auth.currentProfile = null; auth.view = 'picker';
      }
      renderAuthOverlay(); renderAuthBar();
    }
  }
}

// --- Contact modal ---
let _contactRenderedAt = 0;
function openContactModal() {
  const m = document.getElementById('contact-modal');
  if (!m) return;
  m.hidden = false; _contactRenderedAt = Date.now();
  m.innerHTML = `
    <div class="auth-card">
      <h2>📩 בקשת גישה</h2>
      <p class="muted">תני לי לדעת מי את ולמה — אאשר ידנית.</p>
      <input type="text"  id="cr-name"  placeholder="שם" autocomplete="name"><br><br>
      <input type="email" id="cr-email" placeholder="אימייל" autocomplete="email"><br><br>
      <textarea id="cr-msg" placeholder="קצת רקע (אופציונלי)"></textarea>
      <input type="text" class="honeypot" id="cr-honeypot" tabindex="-1" autocomplete="off">
      <div class="row">
        <button class="btn speak" id="cr-send">שלחי בקשה</button>
        <button class="btn prev" id="cr-cancel">ביטול</button>
      </div>
      <div id="cr-feedback" style="margin-top:10px; font-weight:bold; min-height:1.4em;"></div>
    </div>`;
  document.getElementById('cr-cancel').onclick = () => { m.hidden = true; m.innerHTML = ''; };
  document.getElementById('cr-send').onclick = async () => {
    const email = (document.getElementById('cr-email').value || '').trim();
    const name  = (document.getElementById('cr-name').value  || '').trim();
    const msg   = (document.getElementById('cr-msg').value   || '').trim();
    const hp    = (document.getElementById('cr-honeypot').value || '').trim();
    const fb    = document.getElementById('cr-feedback');
    if (hp || (Date.now() - _contactRenderedAt) < 3000) {
      fb.style.color = '#43a047'; fb.textContent = '✨ נשלח! נחזור אליך.';
      setTimeout(() => { m.hidden = true; m.innerHTML = ''; }, 1200);
      return;
    }
    if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) { fb.style.color = '#c62828'; fb.textContent = 'אימייל לא תקין'; return; }
    if (!auth.client) { fb.style.color = '#c62828'; fb.textContent = 'Supabase לא מוגדר — ראה SETUP.md'; return; }
    const { error } = await auth.client.from('access_requests').insert({ email, name: name || null, message: msg || null });
    if (error) { fb.style.color = '#c62828'; fb.textContent = 'שגיאה: ' + error.message; return; }
    fb.style.color = '#43a047'; fb.textContent = '✨ נשלח! נחזור אליך.';
    setTimeout(() => { m.hidden = true; m.innerHTML = ''; }, 1500);
  };
}

function attachContactLink() {
  const link = document.getElementById('contact-link');
  if (link) link.onclick = (e) => { e.preventDefault(); openContactModal(); };
}

// --- Admin Requests tab ---
function applyModeVisibility() {
  // Add/remove the "requests" tab based on admin status
  const modes = document.querySelector('.modes');
  if (!modes) return;
  let req = modes.querySelector('[data-mode="requests"]');
  if (auth.isAdmin) {
    if (!req) {
      req = document.createElement('button');
      req.setAttribute('data-mode', 'requests');
      req.textContent = '📥 בקשות';
      req.onclick = () => activateMode(req);
      modes.appendChild(req);
    }
  } else if (req) {
    req.remove();
  }
  updateRequestsBadge();
}

function activateMode(btn) {
  document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  state.mode = btn.dataset.mode;
  resetModeState();
  render();
}

function renderRequests() {
  return `
    <h2 style="text-align:center; color:#d81b60; margin-bottom:12px;">📥 בקשות גישה</h2>
    <div id="req-list" style="margin-top:10px;">טוען...</div>
  `;
}

async function attachRequestsEvents() {
  const list = document.getElementById('req-list');
  if (!list) return;
  const { data, error } = await auth.client.from('access_requests')
    .select('*').order('created_at', { ascending: false });
  if (error) { list.innerHTML = 'שגיאה: ' + escapeHtml(error.message); return; }
  if (!data || !data.length) { list.innerHTML = '<p>אין בקשות.</p>'; return; }
  list.innerHTML = data.map(r => `
    <div class="request-row ${r.status}">
      <div><b>${escapeHtml(r.email)}</b>${r.name ? ' · ' + escapeHtml(r.name) : ''}</div>
      ${r.message ? `<div style="margin-top:4px;">${escapeHtml(r.message)}</div>` : ''}
      <div class="request-meta">${new Date(r.created_at).toLocaleString('he-IL')} · ${r.status}</div>
      ${r.status === 'pending' ? `<div style="margin-top:8px; display:flex; gap:8px;">
        <button class="btn speak" data-action="approve" data-id="${r.id}" data-email="${escapeAttr(r.email)}">✅ אשרי</button>
        <button class="btn prev"  data-action="reject"  data-id="${r.id}">❌ דחי</button>
      </div>` : ''}
    </div>
  `).join('');
  list.querySelectorAll('[data-action]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.id;
      const action = b.dataset.action;
      if (action === 'approve') {
        const email = (b.dataset.email || '').toLowerCase();
        try { await auth.client.from('allowed_emails').upsert({ email, added_by: auth.session.user.id }); } catch (e) {}
        await auth.client.from('access_requests').update({ status: 'approved', reviewed_at: new Date().toISOString() }).eq('id', id);
      } else {
        await auth.client.from('access_requests').update({ status: 'rejected', reviewed_at: new Date().toISOString() }).eq('id', id);
      }
      auth.unreadRequests = Math.max(0, auth.unreadRequests - 1);
      updateRequestsBadge();
      attachRequestsEvents();
    };
  });
  auth.unreadRequests = 0;
  updateRequestsBadge();
}

function subscribeAdminRealtime() {
  if (!auth.client || !auth.isAdmin || auth.realtimeChannel) return;
  auth.realtimeChannel = auth.client.channel('access_requests_new')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'access_requests' },
      () => { auth.unreadRequests += 1; updateRequestsBadge(); })
    .subscribe();
  auth.client.from('access_requests').select('id', { count: 'exact', head: true }).eq('status', 'pending')
    .then(({ count }) => { auth.unreadRequests = count || 0; updateRequestsBadge(); });
}

function updateRequestsBadge() {
  const btn = document.querySelector('.modes button[data-mode="requests"]');
  if (!btn) return;
  btn.innerHTML = auth.unreadRequests > 0
    ? `📥 בקשות <span class="req-dot"></span>${auth.unreadRequests}`
    : '📥 בקשות';
}

// ====== Init ======
document.querySelectorAll(".modes button").forEach(b => {
  b.onclick = () => activateMode(b);
});

// Load saved guest stats (will be overridden by Supabase if authed)
loadGuestStats();

// Persist guest stats on unload (no-op for authed since progress is on server)
window.addEventListener("beforeunload", () => {
  if (isAuthed()) return;
  try {
    localStorage.setItem("ro-kids-stats", JSON.stringify({
      score: state.score, bestStreak: state.bestStreak, seen: state.seen,
    }));
  } catch (e) {}
});

resetModeState();
render();

// Boot auth: wait for SDK if pending
if (window._supabase !== undefined) initAuth();
else window.addEventListener("supabase-ready", initAuth, { once: true });
</script>
